spring:
  application:
    name: LMS
  datasource:
    # 민감정보는 환경변수에서 주입
    # 예: DB_URL, DB_USERNAME, DB_PASSWORD
    url: ${DB_URL:jdbc:mysql://localhost:3308/lms?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # 핵심: 스키마 자동 생성/수정은 하지 않고, 테이블 구조 검증만 수행
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  sql:
    init:
      # 운영/개발 중 데이터 보존을 위해 매 기동 시 초기화하지 않음
      # (필요할 때만 수동으로 schema.sql, data.sql 실행)
      mode: never

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}
            scope:
              - profile
              - email
          naver:
            client-id: ${NAVER_CLIENT_ID:dummy-naver-client-id}
            client-secret: ${NAVER_CLIENT_SECRET:dummy-naver-client-secret}
            client-name: Naver
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

logging:
  level:
    # JdbcTemplate가 실행하는 SQL을 로그로 확인하기 좋게 설정
    org.springframework.jdbc.core.JdbcTemplate: DEBUG
    org.springframework.jdbc.core.StatementCreatorUtils: TRACE

server:
  port: 8080

app:
  auth:
    token-secret: ${CHATBOT_TOKEN_SECRET:change-me-token-secret}
    dev-auto-token-enabled: ${CHATBOT_DEV_AUTO_TOKEN_ENABLED:true}
    dev-user-id: ${CHATBOT_DEV_USER_ID:dev-user}
    dev-token-ttl-seconds: ${CHATBOT_DEV_TOKEN_TTL_SECONDS:31536000}
    issue-api-key: ${CHATBOT_ISSUE_API_KEY:}
    default-issue-ttl-seconds: ${CHATBOT_DEFAULT_ISSUE_TTL_SECONDS:31536000}
    max-issue-ttl-seconds: ${CHATBOT_MAX_ISSUE_TTL_SECONDS:31536000}
    refresh-token-ttl-seconds: ${CHATBOT_REFRESH_TOKEN_TTL_SECONDS:1209600}
    refresh-cookie-name: ${CHATBOT_REFRESH_COOKIE_NAME:chatbot_refresh_token}
    refresh-cookie-secure: ${CHATBOT_REFRESH_COOKIE_SECURE:false}
    refresh-cookie-same-site: ${CHATBOT_REFRESH_COOKIE_SAME_SITE:Lax}
  rate-limit:
    enabled: ${CHATBOT_RATE_LIMIT_ENABLED:true}
    requests-per-minute: ${CHATBOT_RATE_LIMIT_RPM:30}
  gateway:
    url: ${OPENCLAW_GATEWAY_URL:http://127.0.0.1:18789}
    token: ${OPENCLAW_GATEWAY_TOKEN:}
    config-path: ${OPENCLAW_CONFIG_PATH:~/.openclaw/openclaw.json}
    agent-id: ${OPENCLAW_AGENT_ID:chatbot}
    session-key: ${OPENCLAW_SESSION_KEY:}
