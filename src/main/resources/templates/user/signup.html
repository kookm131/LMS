<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>회원가입 - CodePilot</title>
    <style>
        :root { --main:#03c75a; --line:#e5e7eb; --bg:#f9fafb; }
        * { box-sizing: border-box; }
        body { margin:0; font-family:"Noto Sans KR", Arial, sans-serif; background:var(--bg); }
        .wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        .card { width:100%; max-width:520px; background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; }
        .logo { display:block; text-align:center; text-decoration:none; color:var(--main); font-size:30px; font-weight:900; margin-bottom:20px; }
        .title { margin:0 0 14px; font-size:20px; }
        .type-row { display:flex; gap:10px; margin-bottom:14px; }
        .type-pill { flex:1; border:1px solid var(--line); border-radius:999px; padding:10px; text-align:center; cursor:pointer; }
        .type-pill input { margin-right:6px; }
        .form-row { margin-bottom:10px; }
        label { display:block; font-size:13px; margin-bottom:6px; }
        input { width:100%; border:1px solid var(--line); border-radius:10px; padding:10px; }
        .gender-row { display:flex; gap:14px; padding:8px 0; }
        .error { color:#dc2626; font-size:12px; margin-top:4px; }
        .submit-btn { width:100%; border:none; border-radius:10px; background:var(--main); color:#fff; font-weight:700; padding:12px; cursor:pointer; margin-top:8px; }
        .help { font-size:12px; color:#6b7280; margin-bottom:8px; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <!-- 요청사항: layout 사용하지 않고 중앙 상단 로고 + 홈 링크 -->
        <a class="logo" th:href="@{/}">CodePilot</a>
        <h1 class="title">회원가입</h1>

        <form th:action="@{/signup}" th:object="${form}" method="post" id="signupForm" novalidate>
            <div class="type-row">
                <label class="type-pill">
                    <input type="radio" th:field="*{userType}" value="BUSINESS" data-label="회원유형" required>
                    사업자
                </label>
                <label class="type-pill">
                    <input type="radio" th:field="*{userType}" value="NORMAL" data-label="회원유형" required>
                    일반
                </label>
            </div>
            <div class="error" th:errors="*{userType}"></div>

            <div class="help">모든 항목은 필수입니다.</div>

            <div id="normalFields">
                <div class="form-row">
                    <label>아이디</label>
                    <input th:field="*{username}" type="text" data-label="아이디" required>
                    <div class="error" th:errors="*{username}"></div>
                </div>

                <div class="form-row">
                    <label>비밀번호</label>
                    <input th:field="*{password}" type="password" data-label="비밀번호" required>
                    <div class="error" th:errors="*{password}"></div>
                </div>

                <div class="form-row">
                    <label>비밀번호 확인</label>
                    <input th:field="*{passwordConfirm}" type="password" data-label="비밀번호 확인" required>
                    <div class="error" th:errors="*{passwordConfirm}"></div>
                </div>

                <div class="form-row">
                    <label>이메일</label>
                    <input th:field="*{email}" type="email" data-label="이메일" required>
                    <div class="error" th:errors="*{email}"></div>
                </div>

                <div class="form-row">
                    <label>이름</label>
                    <input th:field="*{name}" type="text" data-label="이름" required>
                    <div class="error" th:errors="*{name}"></div>
                </div>

                <div class="form-row">
                    <label>생년월일</label>
                    <input th:field="*{birthDate}" type="date" data-label="생년월일" required>
                    <div class="error" th:errors="*{birthDate}"></div>
                </div>

                <div class="form-row">
                    <label>성별</label>
                    <div class="gender-row">
                        <label><input type="radio" th:field="*{gender}" value="MALE" data-label="성별" required> 남자</label>
                        <label><input type="radio" th:field="*{gender}" value="FEMALE" data-label="성별" required> 여자</label>
                    </div>
                    <div class="error" th:errors="*{gender}"></div>
                </div>

                <div class="form-row">
                    <label>전화번호</label>
                    <input th:field="*{phone}" type="text" placeholder="010-1234-5678" data-label="전화번호" required>
                    <div class="error" th:errors="*{phone}"></div>
                </div>
            </div>

            <button class="submit-btn" type="submit">가입하기</button>
        </form>
    </div>
</div>

<script>
    // 필수 입력 누락 시: "(항목)는 필수항목입니다" 알림
    const form = document.getElementById('signupForm');
    form.querySelectorAll('[required]').forEach((el) => {
        el.addEventListener('invalid', function () {
            const label = this.dataset.label || '항목';
            this.setCustomValidity(label + '는 필수항목입니다');
        });
        el.addEventListener('input', function () { this.setCustomValidity(''); });
        el.addEventListener('change', function () { this.setCustomValidity(''); });
    });

    // 사업자 선택 시(현재 미구현) 제출 차단
    form.addEventListener('submit', function (e) {
        const userType = form.querySelector('input[name="userType"]:checked');
        if (userType && userType.value === 'BUSINESS') {
            e.preventDefault();
            alert('사업자 회원가입은 아직 준비중입니다. 일반 회원가입을 선택해주세요.');
        }
    });
</script>
</body>
</html>
