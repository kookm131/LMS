<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>로그인 - CodePilot</title>
    <style>
        :root { --main:#03c75a; --line:#e5e7eb; --bg:#f5f6f8; }
        * { box-sizing: border-box; }
        body { margin:0; font-family:"Noto Sans KR", Arial, sans-serif; background:var(--bg); }
        .wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        .card { width:100%; max-width:460px; background:#fff; border:1px solid var(--line); border-radius:14px; padding:28px 24px; }

        .logo { display:block; text-align:center; text-decoration:none; color:var(--main); font-size:34px; font-weight:900; margin-bottom:8px; }
        h1 { margin:0 0 18px; font-size:20px; text-align:center; }

        .input-box { border:1px solid #cfd4da; border-radius:8px; overflow:hidden; }
        .input-box input {
            width:100%; border:none; padding:14px 12px; font-size:15px; outline:none;
        }
        .input-box input + input { border-top:1px solid #eef1f4; }

        .keep-row {
            margin-top:10px; display:flex; align-items:center; justify-content:space-between;
            font-size:13px; color:#4b5563;
        }

        .login-btn {
            width:100%; border:none; border-radius:8px; background:var(--main); color:#fff;
            font-size:16px; font-weight:700; padding:13px; margin-top:12px; cursor:pointer;
        }

        .link-row {
            margin-top:12px; text-align:center; font-size:13px; color:#6b7280;
        }
        .link-row a { color:#4b5563; text-decoration:none; }

        .divider { margin:18px 0; border-top:1px solid #eef1f4; }

        .oauth-btn {
            width:100%; border:1px solid #03c75a; background:#fff; border-radius:8px;
            padding:11px; font-weight:700; cursor:pointer; text-decoration:none; color:#03c75a;
            display:block; text-align:center; margin-bottom:8px;
        }
        .oauth-google { }
        .oauth-naver { }

        .msg { font-size:13px; margin-top:10px; color:#dc2626; text-align:center; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <div th:replace="~{fragments/auth-layout :: authContainer('로그인')}"></div>

        <form th:action="@{/login}" method="post">
            <div class="input-box">
                <input type="text" name="username" placeholder="아이디" required>
                <input type="password" name="password" placeholder="비밀번호" required>
            </div>

            <div class="keep-row">
                <label><input type="checkbox" name="remember-me"> 로그인 상태 유지</label>
            </div>

            <button class="login-btn" type="submit">로그인</button>
        </form>

        <div class="link-row">
            <a href="#">비밀번호 찾기</a> |
            <a href="#">아이디 찾기</a> |
            <a th:href="@{/signup}">회원가입</a>
        </div>

        <div class="divider"></div>

        <a class="oauth-btn oauth-google" th:href="@{/oauth2/authorization/google}">구글로 로그인</a>
        <a class="oauth-btn oauth-naver" th:href="@{/oauth2/authorization/naver}">네이버로 로그인</a>

        <p class="msg" th:if="${param.error}">아이디 또는 비밀번호가 올바르지 않습니다.</p>
        <p class="msg" th:if="${param.logout}">로그아웃 되었습니다.</p>
        <p class="msg" th:if="${param.oauthError}">소셜 로그인 설정을 확인해주세요.</p>
    </div>
</div>
</body>
</html>
