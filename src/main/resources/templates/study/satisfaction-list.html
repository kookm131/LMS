<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>만족도평가</title>
    <style>
        :root { --main:#03c75a; --line:#e5e7eb; --bg:#f9fafb; }
        * { box-sizing:border-box; }
        body { margin:0; font-family:"Noto Sans KR", Arial, sans-serif; background:var(--bg); color:#111827; }
        .container { max-width:1100px; margin:0 auto; padding:20px; }

        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .logo { font-size:28px; font-weight:800; color:var(--main); text-decoration:none; }
        .user-menu a { text-decoration:none; color:#374151; margin-left:14px; font-size:14px; }
        .main-menu { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
        .main-menu a { text-decoration:none; background:white; border:1px solid var(--line); padding:10px 16px; border-radius:999px; color:#111827; font-weight:600; font-size:14px; }
        .search-area { background:white; border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:20px; }
        .search-box { display:flex; border:2px solid var(--main); border-radius:999px; overflow:hidden; }
        .search-box input { flex:1; border:none; padding:14px 18px; font-size:16px; outline:none; }
        .search-box button { border:none; background:var(--main); color:white; padding:0 22px; font-weight:700; cursor:pointer; }

        .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; }
        h1 { margin:0 0 12px; font-size:24px; }
        .item { border-bottom:1px solid #f1f5f9; padding:12px 4px; display:flex; justify-content:space-between; gap:12px; align-items:center; }
        .item:last-child { border-bottom:none; }
        .title { margin:0 0 4px; font-weight:700; font-size:16px; }
        .title a { text-decoration:none; color:inherit; }
        .meta { font-size:13px; color:#6b7280; }

        .right { display:flex; align-items:center; gap:14px; min-width:240px; justify-content:flex-end; }
        .score-value { color:#2563eb; font-weight:700; font-size:16px; }
        .status { font-size:16px; font-weight:700; }
        .status-yes { color:#03c75a; }
        .status-no { color:#dc2626; }

        .pagination { margin-top:14px; display:flex; justify-content:center; gap:6px; flex-wrap:wrap; }
        .pagination a, .pagination span { min-width:34px; text-align:center; padding:8px 10px; border:1px solid var(--line); border-radius:8px; text-decoration:none; color:#374151; background:#fff; font-size:13px; }
        .pagination .active { background:var(--main); color:#fff; border-color:var(--main); }
    </style>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: topLayout(${isAuthenticated})}"></div>

    <section class="card">
        <h1>만족도평가</h1>

        <div class="item" th:each="e : ${enrollments}">
            <div>
                <p class="title"><a th:href="@{/study/satisfaction/{id}(id=${e.courseId})}" th:text="${e.title}">강의명</a></p>
                <div class="meta" th:text="${e.category} + ' · ' + ${e.instructorName}">카테고리 · 강사</div>
            </div>
            <div class="right">
                <div class="score-value" th:text="${#numbers.formatDecimal(e.progressRate,1,1)} + '점'">100.0점</div>
                <div class="status status-yes" th:if="${#lists.contains(surveyedCourseIds, e.courseId)}">참여</div>
                <div class="status status-no" th:if="${!#lists.contains(surveyedCourseIds, e.courseId)}">미참여</div>
            </div>
        </div>

        <div class="item" th:if="${#lists.isEmpty(enrollments)}">
            <div class="meta">수료한 강의가 없습니다.</div>
        </div>

        <div class="pagination">
            <a th:if="${hasPrevGroup}" th:href="@{/study/satisfaction(page=${prevGroupPage})}">←</a>
            <th:block th:each="p : ${#numbers.sequence(startPage, endPage)}">
                <a th:if="${p != currentPage}" th:href="@{/study/satisfaction(page=${p})}" th:text="${p}">1</a>
                <span th:if="${p == currentPage}" class="active" th:text="${p}">1</span>
            </th:block>
            <a th:if="${hasNextGroup}" th:href="@{/study/satisfaction(page=${nextGroupPage})}">→</a>
        </div>
    </section>
</div>
</body>
</html>
