<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>학습 메모</title>
    <style>
        :root { --main:#03c75a; --line:#e5e7eb; --bg:#f9fafb; }
        * { box-sizing:border-box; }
        body { margin:0; font-family:"Noto Sans KR", Arial, sans-serif; background:var(--bg); color:#111827; }
        .container { max-width:1200px; margin:0 auto; padding:20px; }

        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .logo { font-size:28px; font-weight:800; color:var(--main); text-decoration:none; }
        .user-menu a { text-decoration:none; color:#374151; margin-left:14px; font-size:14px; }
        .main-menu { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
        .main-menu > a, .main-menu > div > a { text-decoration:none; background:white; border:1px solid var(--line); padding:10px 16px; border-radius:999px; color:#111827; font-weight:600; font-size:14px; }
        .search-area { background:white; border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:20px; }
        .search-box { display:flex; border:2px solid var(--main); border-radius:999px; overflow:hidden; }
        .search-box input { flex:1; border:none; padding:14px 18px; font-size:16px; outline:none; }
        .search-box button { border:none; background:var(--main); color:white; padding:0 22px; font-weight:700; cursor:pointer; }

        .head { background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:12px; }
        .head h1 { margin:0 0 4px; font-size:22px; }
        .meta { color:#6b7280; font-size:13px; }
        .layout { display:grid; grid-template-columns: minmax(0,1fr) 340px; gap:16px; align-items:start; }
        .card { background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px; box-shadow:0 2px 8px rgba(15,23,42,0.04); }
        .editor { width:100%; min-height:520px; border:1px solid #d1d5db; border-radius:10px; padding:12px; resize:vertical; background:#f8fafc;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
        .toolbar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; align-items:center; justify-content:flex-start; }
        .btn { border:1px solid #03c75a; background:#03c75a; color:#fff; border-radius:8px; padding:7px 10px; font-size:12px; cursor:pointer; }
        .btn.sub { border-color:#d1d5db; background:#fff; color:#374151; }
        .sticky { position:sticky; top:12px; display:grid; gap:10px; }
        .summary input, .question input { width:100%; border:1px solid #d1d5db; border-radius:8px; padding:8px; margin-bottom:6px; }
        .status-badge { display:inline-flex; align-items:center; justify-content:center; min-width:110px; height:30px; border-radius:999px; padding:0 12px; font-size:12px; font-weight:800; background:#e5e7eb; color:#374151; border:1px solid #d1d5db; }
        .status-saving { background:#fef3c7; color:#92400e; }
        .status-saved { background:#dcfce7; color:#166534; }
        .list { max-height:200px; overflow:auto; display:grid; gap:6px; }
        .item { border:1px solid #eef2f7; border-radius:8px; padding:8px; font-size:13px; }
        .question-row { display:flex; justify-content:space-between; gap:8px; align-items:flex-start; }
        .chip { border-radius:999px; padding:2px 8px; font-size:11px; }
        .chip.OPEN { background:#fee2e2; color:#991b1b; }
        .chip.DONE { background:#dcfce7; color:#166534; }
        @media (max-width: 980px){ .layout{ grid-template-columns:1fr; } .sticky{ position:static; } .toolbar{justify-content:center;} .head{text-align:center;} }
    </style>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: topLayout(${isAuthenticated})}"></div>

    <section class="head">
        <h1 th:text="${course.title}">강의명</h1>
        <div class="meta" th:text="${course.category} + ' · ' + ${course.instructorName}">메타</div>
        <div style="margin-top:8px;"><a class="btn sub" th:href="@{/study/notes}" style="text-decoration:none;">강의 선택으로 돌아가기</a></div>
    </section>

    <section class="layout">
        <div class="card">
            <div class="toolbar">
                <button class="btn sub" type="button" id="insert-time-btn">시간 링크 추가(00:00)</button>
                <button class="btn sub" type="button" id="insert-code-btn">코드 스니펫 추가</button>
                <span id="saveBadge" class="status-badge">저장 대기</span>
            </div>
            <textarea id="noteContent" class="editor" th:text="${noteContent}" placeholder="강의 전체 학습 메모를 자유롭게 작성하세요"></textarea>

            <div class="card" style="margin-top:10px; padding:10px;">
                <strong>학습목차</strong>
                <div class="meta" style="margin-top:4px;" th:if="${#lists.isEmpty(outline)}">목차가 없습니다.</div>
                <div class="list" style="margin-top:8px; max-height:150px;">
                    <div class="item" th:each="o : ${outline}" th:text="${o.orderNo} + '. ' + ${o.title} + ' (' + ${o.durationMin} + '분)'">목차</div>
                </div>
            </div>
        </div>

        <aside class="sticky">
            <section class="card summary">
                <strong>핵심요약 (3줄)</strong>
                <input id="summary1" type="text" placeholder="요약 1" th:value="${summaryLine1}">
                <input id="summary2" type="text" placeholder="요약 2" th:value="${summaryLine2}">
                <input id="summary3" type="text" placeholder="요약 3" th:value="${summaryLine3}">
                <button class="btn" type="button" id="saveSummaryBtn">요약 저장</button>
            </section>

            <section class="card question">
                <strong>질문 남기기</strong>
                <input id="questionInput" type="text" placeholder="질문을 입력하세요">
                <button class="btn" type="button" id="addQuestionBtn">질문 추가</button>
                <div id="questionList" class="list" style="margin-top:8px; max-height:220px;">
                    <div class="item" th:each="q : ${questions}" th:attr="data-id=${q.id}">
                        <div class="question-row">
                            <span th:text="${q.questionText}">질문</span>
                            <span class="chip" th:classappend="${q.status}" th:text="${q.status == 'DONE' ? '해결' : '미해결'}">미해결</span>
                        </div>
                        <button class="btn sub toggle-status" type="button" style="margin-top:6px;" th:attr="data-id=${q.id},data-status=${q.status}" th:text="${q.status == 'DONE' ? '미해결로 변경' : '해결 처리'}">해결 처리</button>
                    </div>
                </div>
            </section>

            <section class="card">
                <strong>시간링크 목록 (자동 추출)</strong>
                <div id="timeLinks" class="list" style="margin-top:8px; max-height:180px;">
                    <div class="meta">감지된 시간 링크가 없습니다.</div>
                </div>
            </section>
        </aside>
    </section>
</div>

<input type="hidden" id="csrfHeader" th:value="${_csrf.headerName}">
<input type="hidden" id="csrfToken" th:value="${_csrf.token}">

<script th:inline="javascript">
    const courseId = /*[[${course.courseId}]]*/ 0;
    const noteContent = document.getElementById('noteContent');
    const saveBadge = document.getElementById('saveBadge');
    const timeLinks = document.getElementById('timeLinks');
    const csrfHeader = document.getElementById('csrfHeader').value;
    const csrfToken = document.getElementById('csrfToken').value;

    const withCsrf = (options = {}) => ({
        ...options,
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8',
            [csrfHeader]: csrfToken,
            ...(options.headers || {})
        }
    });

    const insertAtCursor = (text) => {
        const start = noteContent.selectionStart ?? noteContent.value.length;
        const end = noteContent.selectionEnd ?? noteContent.value.length;
        const before = noteContent.value.substring(0, start);
        const after = noteContent.value.substring(end);
        noteContent.value = before + text + after;
        const pos = start + text.length;
        noteContent.setSelectionRange(pos, pos);
        noteContent.focus();
        onEditorChange();
    };

    document.getElementById('insert-time-btn').addEventListener('click', () => insertAtCursor('00:00 '));
    document.getElementById('insert-code-btn').addEventListener('click', () => insertAtCursor('\n```java\n// code here\n```\n'));

    const renderTimeLinks = () => {
        const value = noteContent.value || '';
        const times = [...new Set((value.match(/\b\d{2}:\d{2}\b/g) || []))];
        if (!times.length) {
            timeLinks.innerHTML = '<div class="meta">감지된 시간 링크가 없습니다.</div>';
            return;
        }
        timeLinks.innerHTML = times.map(t => `<div class="item">🔗 ${t} 이동 링크 존재</div>`).join('');
    };

    let saveTimer = null;
    const setSaving = (state) => {
        saveBadge.className = 'status-badge ' + (state === 'saving' ? 'status-saving' : 'status-saved');
        saveBadge.textContent = state === 'saving' ? '자동저장 중' : '저장 완료';
    };

    const autosave = async () => {
        setSaving('saving');
        const body = new URLSearchParams({ noteContent: noteContent.value || '' });
        await fetch(`/study/notes/courses/${courseId}/autosave`, withCsrf({ method:'POST', body }));
        setSaving('saved');
    };

    const onEditorChange = () => {
        renderTimeLinks();
        setSaving('saving');
        if (saveTimer) clearTimeout(saveTimer);
        saveTimer = setTimeout(autosave, 700);
    };

    noteContent.addEventListener('input', onEditorChange);
    renderTimeLinks();

    document.getElementById('saveSummaryBtn').addEventListener('click', async () => {
        const body = new URLSearchParams({
            line1: document.getElementById('summary1').value || '',
            line2: document.getElementById('summary2').value || '',
            line3: document.getElementById('summary3').value || ''
        });
        await fetch(`/study/notes/courses/${courseId}/summary`, withCsrf({ method:'POST', body }));
        alert('요약 저장 완료');
    });

    const bindToggleButtons = () => {
        document.querySelectorAll('.toggle-status').forEach(btn => {
            btn.onclick = async () => {
                const id = btn.dataset.id;
                const current = btn.dataset.status;
                const next = current === 'DONE' ? 'OPEN' : 'DONE';
                const body = new URLSearchParams({ status: next });
                await fetch(`/study/notes/courses/${courseId}/questions/${id}/status`, withCsrf({ method:'POST', body }));
                location.reload();
            }
        });
    };

    document.getElementById('addQuestionBtn').addEventListener('click', async () => {
        const input = document.getElementById('questionInput');
        const q = (input.value || '').trim();
        if (!q) return;
        const body = new URLSearchParams({ question: q });
        await fetch(`/study/notes/courses/${courseId}/questions`, withCsrf({ method:'POST', body }));
        location.reload();
    });

    bindToggleButtons();
</script>
</body>
</html>
