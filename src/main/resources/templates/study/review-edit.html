<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>수강평 수정</title>
    <style>
        body { margin:0; font-family:"Noto Sans KR", Arial, sans-serif; background:#f9fafb; color:#111827; }
        .container { max-width:1100px; margin:0 auto; padding:20px; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .logo { font-size:28px; font-weight:800; color:#03c75a; text-decoration:none; }
        .user-menu a { text-decoration:none; color:#374151; margin-left:14px; font-size:14px; }
        .main-menu { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
        .main-menu a { text-decoration:none; background:white; border:1px solid #e5e7eb; padding:10px 16px; border-radius:999px; color:#111827; font-weight:600; font-size:14px; }
        .search-area { background:white; border:1px solid #e5e7eb; border-radius:16px; padding:20px; margin-bottom:20px; }
        .search-box { display:flex; border:2px solid #03c75a; border-radius:999px; overflow:hidden; }
        .search-box input { flex:1; border:none; padding:14px 18px; font-size:16px; outline:none; }
        .search-box button { border:none; background:#03c75a; color:white; padding:0 22px; font-weight:700; cursor:pointer; }
        .card { background:#fff; border:1px solid #e5e7eb; border-radius:14px; padding:18px; }
        h1 { margin:0 0 12px; font-size:24px; }
        textarea { width:100%; box-sizing:border-box; box-sizing:border-box; min-height:120px; resize:vertical; margin:10px 0; border:1px solid #d1d5db; border-radius:10px; padding:10px; font-size:14px; }
        .star-control { position:relative; width:120px; font-size:24px; line-height:1; cursor:pointer; user-select:none; }
        .star-bg { color:#d1d5db; }
        .star-fill { position:absolute; left:0; top:0; overflow:hidden; white-space:nowrap; color:#f59e0b; width:100%; }
        .actions { margin-top:12px; display:flex; justify-content:flex-end; gap:8px; }
        .btn { text-decoration:none; border:1px solid #d1d5db; background:#fff; color:#374151; padding:10px 14px; border-radius:8px; font-size:13px; cursor:pointer; }
        .btn-primary { border-color:#03c75a; background:#03c75a; color:#fff; font-weight:700; }
    </style>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: topLayout(${isAuthenticated})}"></div>

    <section class="card">
        <h1>수강평 수정</h1>

        <form th:action="@{/study/courses/{cid}/reviews/{rid}/edit(cid=${courseId}, rid=${reviewId})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div>
                <input id="ratingValueInput" type="hidden" name="rating" th:value="${rating}" >
                <div class="meta"><span id="ratingValue" th:text="${#numbers.formatDecimal(rating,1,1)}">5.0</span>점</div>
                <div id="starControl" class="star-control" title="클릭/드래그 또는 마우스 휠로 0.5점 단위 조절">
                    <div class="star-bg">★★★★★</div>
                    <div id="starFill" class="star-fill">★★★★★</div>
                </div>
            </div>

            <textarea name="content" th:text="${content}"></textarea>

            <div class="actions">
                <a class="btn" th:href="@{/study/courses/{id}(id=${courseId})}">취소</a>
                <button class="btn btn-primary" type="submit">수정완료</button>
            </div>
        </form>
    </section>
</div>

<script>
    const ratingInput = document.getElementById('ratingValueInput');
    const ratingValue = document.getElementById('ratingValue');
    const starFill = document.getElementById('starFill');
    const starControl = document.getElementById('starControl');

    if (ratingInput && ratingValue && starFill && starControl) {
        const clampHalf = (v) => Math.max(0, Math.min(5, Math.round(v * 2) / 2));
        const render = (v) => {
            const n = clampHalf(v);
            ratingInput.value = n.toFixed(1);
            ratingValue.textContent = n.toFixed(1);
            starFill.style.width = (n / 5 * 100) + '%';
        };
        const fromPointer = (clientX) => {
            const rect = starControl.getBoundingClientRect();
            const ratio = (clientX - rect.left) / rect.width;
            return clampHalf(ratio * 5);
        };
        let dragging = false;
        starControl.addEventListener('mousedown', (e) => { dragging = true; render(fromPointer(e.clientX)); });
        window.addEventListener('mousemove', (e) => { if (dragging) render(fromPointer(e.clientX)); });
        window.addEventListener('mouseup', () => { dragging = false; });
        starControl.addEventListener('click', (e) => render(fromPointer(e.clientX)));
        starControl.addEventListener('wheel', (e) => {
            e.preventDefault();
            const cur = parseFloat(ratingInput.value || '0');
            render(cur + (e.deltaY < 0 ? 0.5 : -0.5));
        }, { passive: false });

        render(parseFloat(ratingInput.value || '5'));
    }
</script>
</body>
</html>
