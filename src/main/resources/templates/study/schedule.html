<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>수강 스케줄</title>
    <style>
        :root { --main:#03c75a; --line:#e5e7eb; --bg:#f9fafb; }
        * { box-sizing:border-box; }
        body { margin:0; font-family:"Noto Sans KR", Arial, sans-serif; background:var(--bg); color:#111827; }
        .container { max-width:1100px; margin:0 auto; padding:20px; }

        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .logo { font-size:28px; font-weight:800; color:var(--main); text-decoration:none; }
        .user-menu a { text-decoration:none; color:#374151; margin-left:14px; font-size:14px; }
        .main-menu { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
        .main-menu a { text-decoration:none; background:white; border:1px solid var(--line); padding:10px 16px; border-radius:999px; color:#111827; font-weight:600; font-size:14px; }
        .search-area { background:white; border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:20px; }
        .search-box { display:flex; border:2px solid var(--main); border-radius:999px; overflow:hidden; }
        .search-box input { flex:1; border:none; padding:14px 18px; font-size:16px; outline:none; }
        .search-box button { border:none; background:var(--main); color:white; padding:0 22px; font-weight:700; cursor:pointer; }

        .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; }
        h1 { margin:0 0 10px; font-size:24px; }
        .desc { margin:0 0 14px; font-size:14px; color:#4b5563; }

        .week-grid { display:grid; grid-template-columns:repeat(7, 1fr); gap:8px; align-items:start; }
        .day-col { display:flex; flex-direction:column; gap:8px; }
        .day-box { border:1px solid #41bd52; border-radius:10px; min-height:80px; padding:10px; background:#41bd52; }
        .day-title { font-weight:700; margin-bottom:8px; color:#fff; }
        .schedule-item { border:1px solid #91e59c; border-radius:10px; min-height:80px; padding:10px; background:#91e59c; }
        .schedule-title { font-size:12px; font-weight:700; }
        .schedule-time { font-size:12px; color:#6b7280; margin-top:4px; }

        .actions { margin-top:14px; display:flex; justify-content:flex-end; gap:8px; }
        .btn { border:1px solid #d1d5db; background:#fff; color:#374151; padding:9px 14px; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; }
        .btn-danger { border-color:#dc2626; background:#dc2626; color:#fff; }

        @media (max-width:900px){ .week-grid { grid-template-columns:repeat(2, 1fr); } }
    </style>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: topLayout(${isAuthenticated})}"></div>

    <section class="card">
        <h1>수강 스케줄</h1>
        <p class="desc">해당 요일에 알람문자가 갑니다.</p>

        <div class="week-grid">
            <div class="day-col">
                <div class="day-box"><div class="day-title">월</div></div>
                <div class="schedule-item" th:each="s : ${schedules}" th:if="${s.dayOfWeek == '월'}"><div class="schedule-title" th:text="${s.courseTitle}">강의명</div><div class="schedule-time" th:text="${s.alarmTime}">09:00</div></div>
            </div>
            <div class="day-col">
                <div class="day-box"><div class="day-title">화</div></div>
                <div class="schedule-item" th:each="s : ${schedules}" th:if="${s.dayOfWeek == '화'}"><div class="schedule-title" th:text="${s.courseTitle}">강의명</div><div class="schedule-time" th:text="${s.alarmTime}">09:00</div></div>
            </div>
            <div class="day-col">
                <div class="day-box"><div class="day-title">수</div></div>
                <div class="schedule-item" th:each="s : ${schedules}" th:if="${s.dayOfWeek == '수'}"><div class="schedule-title" th:text="${s.courseTitle}">강의명</div><div class="schedule-time" th:text="${s.alarmTime}">09:00</div></div>
            </div>
            <div class="day-col">
                <div class="day-box"><div class="day-title">목</div></div>
                <div class="schedule-item" th:each="s : ${schedules}" th:if="${s.dayOfWeek == '목'}"><div class="schedule-title" th:text="${s.courseTitle}">강의명</div><div class="schedule-time" th:text="${s.alarmTime}">09:00</div></div>
            </div>
            <div class="day-col">
                <div class="day-box"><div class="day-title">금</div></div>
                <div class="schedule-item" th:each="s : ${schedules}" th:if="${s.dayOfWeek == '금'}"><div class="schedule-title" th:text="${s.courseTitle}">강의명</div><div class="schedule-time" th:text="${s.alarmTime}">09:00</div></div>
            </div>
            <div class="day-col">
                <div class="day-box"><div class="day-title">토</div></div>
                <div class="schedule-item" th:each="s : ${schedules}" th:if="${s.dayOfWeek == '토'}"><div class="schedule-title" th:text="${s.courseTitle}">강의명</div><div class="schedule-time" th:text="${s.alarmTime}">09:00</div></div>
            </div>
            <div class="day-col">
                <div class="day-box"><div class="day-title">일</div></div>
                <div class="schedule-item" th:each="s : ${schedules}" th:if="${s.dayOfWeek == '일'}"><div class="schedule-title" th:text="${s.courseTitle}">강의명</div><div class="schedule-time" th:text="${s.alarmTime}">09:00</div></div>
            </div>
        </div>

        <div class="actions">
            <a class="btn" th:href="@{/study/schedule/edit}" style="text-decoration:none; display:inline-flex; align-items:center;">수정</a>
            <form th:action="@{/study/schedule/clear}" method="post" style="margin:0;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-danger" type="submit" onclick="return confirm('수강스케줄표를 전체삭제하겠습니까?');">전체삭제</button>
            </form>
        </div>
    </section>
</div>

</body>
</html>
