<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>학습 메모 강의 선택</title>
    <style>
        :root { --main:#03c75a; --line:#e5e7eb; --bg:#f9fafb; }
        * { box-sizing:border-box; }
        body { margin:0; font-family:"Noto Sans KR", Arial, sans-serif; background:var(--bg); color:#111827; }
        .container { max-width:1100px; margin:0 auto; padding:20px; }

        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .logo { font-size:28px; font-weight:800; color:var(--main); text-decoration:none; }
        .user-menu a { text-decoration:none; color:#374151; margin-left:14px; font-size:14px; }
        .main-menu { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
        .main-menu > a, .main-menu > div > a { text-decoration:none; background:white; border:1px solid var(--line); padding:10px 16px; border-radius:999px; color:#111827; font-weight:600; font-size:14px; }
        .search-area { background:white; border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:20px; }
        .search-box { display:flex; border:2px solid var(--main); border-radius:999px; overflow:hidden; }
        .search-box input { flex:1; border:none; padding:14px 18px; font-size:16px; outline:none; }
        .search-box button { border:none; background:var(--main); color:white; padding:0 22px; font-weight:700; cursor:pointer; }

        .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px; box-shadow:0 2px 8px rgba(15,23,42,0.04); }
        h1 { margin:0 0 12px; font-size:24px; }
        .top-categories,.status-categories { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
        .top-categories a,.status-categories a { text-decoration:none; border:1px solid var(--line); background:#fff; color:#374151; padding:8px 12px; border-radius:999px; font-size:13px; }
        .top-categories a.active { background:#ecfdf3; color:#047857; border-color:#b9f5d0; font-weight:700; }
        .status-categories a.incomplete.active { background:#fee2e2; color:#dc2626; border-color:#fca5a5; }
        .status-categories a.complete.active { background:#dbeafe; color:#1d4ed8; border-color:#93c5fd; }
        .item { border-bottom:1px solid #f1f5f9; padding:14px 6px; display:flex; justify-content:space-between; gap:12px; align-items:center; }
        .item:last-child { border-bottom:none; }
        .title { margin:0 0 4px; font-weight:700; font-size:16px; }
        .meta { font-size:13px; color:#6b7280; }
        .btn { text-decoration:none; border:1px solid #03c75a; background:#03c75a; color:#fff; border-radius:8px; padding:7px 11px; font-size:12px; }
        .pagination { margin-top:14px; display:flex; justify-content:center; gap:6px; flex-wrap:wrap; }
        .pagination a, .pagination span { min-width:34px; text-align:center; padding:8px 10px; border:1px solid var(--line); border-radius:8px; text-decoration:none; color:#374151; background:#fff; font-size:13px; }
        .pagination .active { background:var(--main); color:#fff; border-color:var(--main); }
    </style>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: topLayout(${isAuthenticated})}"></div>

    <section class="card">
        <h1>학습 메모</h1>

        <div class="status-categories">
            <a class="incomplete" th:href="@{/study/notes(completion='incomplete', category='')}" th:classappend="${completion == 'incomplete'} ? 'active'">미수료</a>
            <a class="complete" th:href="@{/study/notes(completion='complete', category='')}" th:classappend="${completion == 'complete'} ? 'active'">수료</a>
        </div>

        <div class="top-categories">
            <a th:href="@{/study/notes(completion=${completion})}" th:classappend="${selectedCategory == ''} ? 'active'">전체</a>
            <a th:each="cat : ${categories}" th:href="@{/study/notes(category=${cat}, completion=${completion})}" th:text="${cat}" th:classappend="${selectedCategory == cat} ? 'active'">카테고리</a>
        </div>

        <div class="item" th:each="e : ${enrollments}">
            <div>
                <p class="title" th:text="${e.title}">강의명</p>
                <div class="meta" th:text="${e.category} + ' · ' + ${e.instructorName} + ' · 진행률 ' + ${#numbers.formatDecimal(e.progressRate,1,1)} + '%'">메타</div>
            </div>
            <div><a class="btn" th:href="@{/study/notes/courses/{id}(id=${e.courseId})}">메모하기</a></div>
        </div>

        <div class="item" th:if="${#lists.isEmpty(enrollments)}"><div class="meta">메모할 수강 강의가 없습니다.</div></div>

        <div class="pagination">
            <a th:if="${hasPrevGroup}" th:href="@{/study/notes(page=${prevGroupPage}, category=${selectedCategory}, completion=${completion})}">←</a>
            <th:block th:each="p : ${#numbers.sequence(startPage, endPage)}">
                <a th:if="${p != currentPage}" th:href="@{/study/notes(page=${p}, category=${selectedCategory}, completion=${completion})}" th:text="${p}">1</a>
                <span th:if="${p == currentPage}" class="active" th:text="${p}">1</span>
            </th:block>
            <a th:if="${hasNextGroup}" th:href="@{/study/notes(page=${nextGroupPage}, category=${selectedCategory}, completion=${completion})}">→</a>
        </div>
    </section>
</div>
</body>
</html>
