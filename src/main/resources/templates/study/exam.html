<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>시험 응시</title>
  <style>
    :root { --main:#03c75a; --line:#e5e7eb; --bg:#f9fafb; }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);font-family:"Noto Sans KR", Arial, sans-serif;color:#111827}
    .container{max-width:1000px;margin:0 auto;padding:20px}

    .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .logo { font-size:28px; font-weight:800; color:var(--main); text-decoration:none; }
    .user-menu a { text-decoration:none; color:#374151; margin-left:14px; font-size:14px; }
    .main-menu { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
    .main-menu a { text-decoration:none; background:white; border:1px solid var(--line); padding:10px 16px; border-radius:999px; color:#111827; font-weight:600; font-size:14px; }
    .search-area { background:white; border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:20px; }
    .search-box { display:flex; border:2px solid var(--main); border-radius:999px; overflow:hidden; }
    .search-box input { flex:1; border:none; padding:14px 18px; font-size:16px; outline:none; }
    .search-box button { border:none; background:var(--main); color:white; padding:0 22px; font-weight:700; cursor:pointer; }

    .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
    h1{margin:0 0 8px;font-size:24px}
    h2{margin:0 0 10px;font-size:18px}
    .meta{font-size:13px;color:#6b7280}
    .opt{display:block;border:1px solid #d1d5db;border-radius:10px;padding:10px;margin-bottom:8px;cursor:pointer}
    .bottom{display:flex;justify-content:center;gap:8px;margin-top:16px}
    .btn{border:1px solid #03c75a;background:#03c75a;color:#fff;border-radius:10px;padding:10px 18px;font-weight:700;cursor:pointer;text-decoration:none}
    .btn.sub{border-color:#d1d5db;background:#fff;color:#374151}
  </style>
</head>
<body>
<div class="container">
  <div th:replace="~{fragments/layout :: topLayout(${isAuthenticated})}"></div>

  <section class="card">
    <h1 th:text="${course.title} + ' - 시험'">시험</h1>
    <div class="meta">문항에 답하고 맨 아래 제출하기를 눌러주세요.</div>
  </section>

  <form id="examForm" class="card" th:action="@{/study/courses/{id}/exam/submit(id=${course.courseId})}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div th:each="q, stat : ${questions}" style="border-bottom:1px solid #f1f5f9; padding:14px 0;">
      <h2 th:text="'문제 ' + ${stat.index + 1}">문제</h2>
      <p th:text="${q.questionText}">문제 내용</p>
      <div th:if="${q.referenceImageUrl != null and !#strings.isEmpty(q.referenceImageUrl)}" style="margin:8px 0;">
        <img th:src="${q.referenceImageUrl}" alt="참고이미지" style="max-width:100%; border:1px solid #e5e7eb; border-radius:8px;"/>
      </div>

      <label class="opt"><input type="radio" th:name="${'q_' + q.id}" value="1" required/> <span th:text="${q.option1}">선택지1</span></label>
      <label class="opt"><input type="radio" th:name="${'q_' + q.id}" value="2"/> <span th:text="${q.option2}">선택지2</span></label>
      <label class="opt"><input type="radio" th:name="${'q_' + q.id}" value="3"/> <span th:text="${q.option3}">선택지3</span></label>
      <label class="opt"><input type="radio" th:name="${'q_' + q.id}" value="4"/> <span th:text="${q.option4}">선택지4</span></label>
    </div>

    <div class="bottom">
      <a class="btn sub" th:href="@{/study/courses/{id}(id=${course.courseId})}">목록으로</a>
      <button class="btn" type="submit">제출하기</button>
    </div>
  </form>
</div>

<script th:inline="javascript">
  const hasPreviousAttempt = /*[[${hasPreviousAttempt}]]*/ false;
  document.getElementById('examForm').addEventListener('submit', function () {
    if (hasPreviousAttempt) {
      alert('이번 성적으로 재응시 됩니다.');
    }
  });
</script>
</body>
</html>
