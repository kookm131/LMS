<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>만족도평가 상세</title>
    <style>
        :root { --main:#03c75a; --line:#e5e7eb; --bg:#f9fafb; }
        * { box-sizing:border-box; }
        body { margin:0; font-family:"Noto Sans KR", Arial, sans-serif; background:var(--bg); color:#111827; }
        .container { max-width:1100px; margin:0 auto; padding:20px; }

        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .logo { font-size:28px; font-weight:800; color:var(--main); text-decoration:none; }
        .user-menu a { text-decoration:none; color:#374151; margin-left:14px; font-size:14px; }
        .main-menu { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
        .main-menu a { text-decoration:none; background:white; border:1px solid var(--line); padding:10px 16px; border-radius:999px; color:#111827; font-weight:600; font-size:14px; }
        .search-area { background:white; border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:20px; }
        .search-box { display:flex; border:2px solid var(--main); border-radius:999px; overflow:hidden; }
        .search-box input { flex:1; border:none; padding:14px 18px; font-size:16px; outline:none; }
        .search-box button { border:none; background:var(--main); color:white; padding:0 22px; font-weight:700; cursor:pointer; }

        .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px; margin-bottom:12px; }
        .title { margin:0; font-size:24px; font-weight:800; }
        .score-table { width:100%; border-collapse:collapse; }
        .score-table th, .score-table td { border:1px solid #e5e7eb; padding:10px; text-align:center; font-size:13px; }
        .score-table th { background:#f8fafc; }
        .total { margin-top:10px; text-align:right; font-size:16px; font-weight:800; }

        .status { font-size:14px; font-weight:700; }
        .status-yes { color:#03c75a; }
        .status-no { color:#dc2626; }

        .survey-done { text-align:center; }
        .star-wrap { position:relative; width:140px; margin:8px auto 0; font-size:28px; line-height:1; }
        .star-bg { color:#d1d5db; }
        .star-fill { position:absolute; left:0; top:0; overflow:hidden; white-space:nowrap; color:#f59e0b; }

        .outside-actions-right { display:flex; justify-content:flex-end; gap:8px; margin-top:10px; }
        .outside-actions-center { display:flex; justify-content:center; margin-top:12px; }
        .btn { border:1px solid #d1d5db; background:#fff; color:#374151; border-radius:8px; padding:10px 14px; text-decoration:none; font-weight:700; font-size:13px; cursor:pointer; }
        .btn-primary { border-color:var(--main); background:var(--main); color:#fff; }
    </style>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: topLayout(${isAuthenticated})}"></div>

    <section class="card">
        <h1 class="title">만족도평가</h1>
    </section>

    <section class="card">
        <h1 class="title" th:text="${course.title}">강의제목</h1>
    </section>

    <section class="card" style="display:flex; justify-content:space-between; align-items:flex-start; gap:12px;">
        <div style="flex:1;">
            <h2 style="margin:0 0 10px; font-size:20px;">성적</h2>
            <table class="score-table">
                <thead><tr><th>구분</th><th>반영비율</th><th>점수</th></tr></thead>
                <tbody>
                <tr><td>진행율</td><td>40%</td><td th:text="${progressPercent}">0.0</td></tr>
                <tr><td>시험</td><td>60%</td><td th:text="${quizPercent}">0.0</td></tr>
                </tbody>
            </table>
            <div class="total" th:text="'총점: ' + ${totalScore}">총점: 0.0</div>
            <div style="margin-top:10px; display:flex; justify-content:flex-end;"><a class="btn" th:href="@{/study/courses/{id}(id=${course.courseId})}">복습하기</a></div>
        </div>
        </section>

    <section class="card survey-done" th:if="${survey != null}">
        <div style="font-weight:800; margin-bottom:6px;">만족도평가를 완료하셨습니다.</div>
        <div style="font-weight:700;" th:text="${#numbers.formatDecimal(survey.overallRating,1,1)} + '점'">4.5점</div>
        <div class="star-wrap">
            <div class="star-bg">★★★★★</div>
            <div class="star-fill" th:style="|width:${survey.overallRating * 20}%|">★★★★★</div>
        </div>
        <div style="display:flex; justify-content:flex-end; margin-top:12px;">
            <form th:action="@{/study/satisfaction/{id}/survey/delete(id=${course.courseId})}" method="post" style="margin:0;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn" style="border-color:#dc2626; background:#dc2626; color:#fff;" onclick="return confirm('만족도평가를 삭제하시겠습니까?');">삭제</button>
            </form>
        </div>
    </section>

    <div class="outside-actions-right">
        <a class="btn" th:if="${survey != null}" th:href="@{/study/satisfaction/{id}/survey/edit(id=${course.courseId})}">수정</a>
        <a class="btn btn-primary" th:if="${survey == null}" th:href="@{/study/satisfaction/{id}/survey(id=${course.courseId})}">만족도평가</a>
        <button type="button" class="btn btn-primary" th:if="${survey != null}" onclick="alert('이미 만족도평가를 하셨습니다.');">만족도평가</button>
    </div>

    <div class="outside-actions-center"><a class="btn" th:href="@{/study/satisfaction}">목록으로</a></div>
</div>

<script th:inline="javascript">
 const surveyDone = /*[[${surveyDone}]]*/ false;
 const alreadySurveyed = /*[[${alreadySurveyed}]]*/ false;
 if(surveyDone){ alert('만족도평가를 완료하셨습니다.'); }
 if(alreadySurveyed){ alert('이미 만족도평가를 하셨습니다.'); }
</script>
</body>
</html>
