<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>공지사항 상세</title>
    <style>
        body { margin:0; font-family:"Noto Sans KR", Arial, sans-serif; background:#f9fafb; color:#111827; }
        .container { max-width:1100px; margin:0 auto; padding:20px; }

        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .logo { font-size:28px; font-weight:800; color:#03c75a; letter-spacing:-0.5px; text-decoration:none; }
        .user-menu a { text-decoration:none; color:#374151; margin-left:14px; font-size:14px; }
        .main-menu { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
        .main-menu a { text-decoration:none; background:white; border:1px solid #e5e7eb; padding:10px 16px; border-radius:999px; color:#111827; font-weight:600; font-size:14px; }
        .search-area { background:white; border:1px solid #e5e7eb; border-radius:16px; padding:20px; margin-bottom:20px; }
        .search-box { display:flex; border:2px solid #03c75a; border-radius:999px; overflow:hidden; }
        .search-box input { flex:1; border:none; padding:14px 18px; font-size:16px; outline:none; }
        .search-box button { border:none; background:#03c75a; color:white; padding:0 22px; font-weight:700; cursor:pointer; }

        .card { background:#fff; border:1px solid #e5e7eb; border-radius:14px; padding:18px; margin-bottom:16px; }
        .card.compact { padding:12px; margin-bottom:10px; }
        .title { margin:0 0 10px; font-size:30px; font-weight:800; }
        .meta { color:#6b7280; font-size:13px; margin-bottom:16px; }
        .content { white-space:pre-wrap; line-height:1.7; }

        .section-title { margin:0 0 12px; font-size:20px; }
        .comment-item { border-bottom:1px solid #f1f5f9; padding:10px 0; }
        .comment-item:last-child { border-bottom:none; }
        .comment-author { font-weight:700; font-size:14px; margin-right:8px; }
        .comment-date { color:#6b7280; font-size:12px; }
        .comment-content { margin-top:6px; font-size:14px; }
        .comment-actions { margin-top:8px; display:flex; gap:6px; justify-content:flex-end; }
        .comment-actions button, .comment-actions a {
            text-decoration:none;
            border:1px solid #d1d5db;
            background:#fff;
            color:#374151;
            padding:5px 8px;
            border-radius:6px;
            font-size:12px;
            cursor:pointer;
        }

        .pagination { margin-top:14px; display:flex; justify-content:center; gap:6px; flex-wrap:wrap; }
        .pagination a, .pagination span {
            min-width:24px; text-align:center; padding:6px 7px; border:1px solid #e5e7eb;
            border-radius:8px; text-decoration:none; color:#374151; background:#fff; font-size:9px;
        }
        .pagination .active { background:#03c75a; color:#fff; border-color:#03c75a; }

        .comment-form textarea { width:100%; box-sizing:border-box; box-sizing:border-box; box-sizing:border-box; border:1px solid #d1d5db; border-radius:10px; padding:10px; min-height:90px; resize:vertical; margin:10px 0; }
        .comment-form button { margin-top:10px; border:none; background:#03c75a; color:#fff; padding:10px 16px; border-radius:8px; cursor:pointer; font-weight:700; }
        .login-hint { color:#6b7280; font-size:14px; }

        .bottom-actions {
            margin-top: 18px;
            display: flex;
            justify-content: center;
        }

        .list-btn {
            text-decoration: none;
            border: 1px solid #e5e7eb;
            background: #fff;
            color: #374151;
            border-radius: 10px;
            padding: 10px 18px;
            font-weight: 700;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: topLayout(${isAuthenticated})}"></div>

    <section class="card">
        <h1 class="title" th:text="${notice.title}">공지 제목</h1>
        <div class="meta" th:text="${#temporals.format(notice.createdAt, 'yyyy.MM.dd HH:mm')}">2026.02.26 10:00</div>
        <div class="content" th:text="${notice.content}">공지 내용</div>
    </section>

    <section class="card compact">
        <h2 class="section-title">댓글</h2>

        <div class="comment-item" th:each="comment : ${comments}">
            <div>
                <span class="comment-author" th:text="${comment.userName}">작성자</span>
                <span class="comment-date" th:text="${#temporals.format(comment.createdAt, 'yyyy.MM.dd HH:mm')}">2026.02.26 10:00</span>
            </div>
            <div class="comment-content" th:text="${comment.content}">댓글 내용</div>

            <div class="comment-actions" th:if="${isAuthenticated and currentUserId != null and currentUserId == comment.userId}">
                <a th:href="@{/community/notices/{nid}/comments/{cid}/edit(nid=${notice.id}, cid=${comment.id})}"
                   onclick="return confirm('정말로 수정 하시겠습니까?');">수정</a>

                <form th:action="@{/community/notices/{nid}/comments/{cid}/delete(nid=${notice.id}, cid=${comment.id})}" method="post" style="margin:0;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" onclick="return confirm('정말로 삭제 하시겠습니까?');">삭제</button>
                </form>
            </div>
        </div>

        <div class="comment-item" th:if="${#lists.isEmpty(comments)}">
            <div class="comment-content">등록된 댓글이 없습니다.</div>
        </div>

        <div class="pagination">
            <a th:if="${hasPrevCommentGroup}" th:href="@{/community/notices/{id}(id=${notice.id}, page=${prevCommentGroupPage})}">←</a>

            <th:block th:each="p : ${#numbers.sequence(commentStartPage, commentEndPage)}">
                <a th:if="${p != commentPage}" th:href="@{/community/notices/{id}(id=${notice.id}, page=${p})}" th:text="${p}">1</a>
                <span th:if="${p == commentPage}" class="active" th:text="${p}">1</span>
            </th:block>

            <a th:if="${hasNextCommentGroup}" th:href="@{/community/notices/{id}(id=${notice.id}, page=${nextCommentGroupPage})}">→</a>
        </div>
    </section>

    <section class="card compact">
        <h2 class="section-title">댓글 쓰기</h2>

        <form class="comment-form" th:if="${isAuthenticated}" th:action="@{/community/notices/{id}/comments(id=${notice.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <textarea name="content" placeholder="댓글을 입력하세요"></textarea>
            <button type="submit">댓글 등록</button>
        </form>

        <p class="login-hint" th:if="${!isAuthenticated}">댓글 쓰기는 로그인 후 이용할 수 있습니다.</p>
    </section>

    <div class="bottom-actions">
        <a class="list-btn" th:href="@{/community/notices}">목록으로</a>
    </div>
</div>
</body>
</html>
