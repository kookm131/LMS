<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>QnA 상세</title>
    <style>
        body { margin:0; font-family:"Noto Sans KR", Arial, sans-serif; background:#f9fafb; color:#111827; }
        .container { max-width:1100px; margin:0 auto; padding:20px; }

        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .logo { font-size:28px; font-weight:800; color:#03c75a; letter-spacing:-0.5px; text-decoration:none; }
        .user-menu a { text-decoration:none; color:#374151; margin-left:14px; font-size:14px; }
        .main-menu { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
        .main-menu a { text-decoration:none; background:white; border:1px solid #e5e7eb; padding:10px 16px; border-radius:999px; color:#111827; font-weight:600; font-size:14px; }
        .search-area { background:white; border:1px solid #e5e7eb; border-radius:16px; padding:20px; margin-bottom:20px; }
        .search-box { display:flex; border:2px solid #03c75a; border-radius:999px; overflow:hidden; }
        .search-box input { flex:1; border:none; padding:14px 18px; font-size:16px; outline:none; }
        .search-box button { border:none; background:#03c75a; color:white; padding:0 22px; font-weight:700; cursor:pointer; }

        .card { background:#fff; border:1px solid #e5e7eb; border-radius:14px; padding:18px; margin-bottom:16px; }
        .title { margin:0 0 10px; font-size:30px; font-weight:800; }
        .meta { color:#6b7280; font-size:13px; margin-bottom:8px; }
        .content { white-space:pre-wrap; line-height:1.7; }
        .section-title { margin:0 0 12px; font-size:20px; }

        .file-box { font-size:14px; color:#374151; }
        .comment-item { border-bottom:1px solid #f1f5f9; padding:12px 0; }
        .comment-item:last-child { border-bottom:none; }
        .comment-author { font-weight:700; font-size:14px; margin-right:8px; }
        .comment-date { color:#6b7280; font-size:12px; }
        .comment-content { margin-top:8px; font-size:14px; white-space:pre-wrap; }
        .accepted-badge { margin-left:8px; font-size:11px; color:#fff; background:#16a34a; border-radius:999px; padding:3px 8px; }
        .accepted-box { border:1px solid #bbf7d0; background:#f0fdf4; border-radius:10px; padding:12px; margin-bottom:12px; position:relative; }
        .unaccept-btn { position:absolute; right:10px; top:10px; border:1px solid #ef4444; color:#b91c1c; background:#fff; border-radius:8px; padding:4px 8px; font-size:12px; cursor:pointer; }

        .comment-actions { margin-top:10px; display:flex; gap:6px; justify-content:flex-end; }
        .comment-actions button, .comment-actions a {
            text-decoration:none; border:1px solid #d1d5db; background:#fff; color:#374151;
            padding:5px 8px; border-radius:6px; font-size:12px; cursor:pointer;
        }

        .accept-btn { margin-top:8px; border:1px solid #16a34a; color:#166534; background:#fff; padding:6px 10px; border-radius:8px; font-size:12px; cursor:pointer; }

        .pagination { margin-top:22px; margin-bottom:16px; display:flex; justify-content:center; gap:6px; flex-wrap:wrap; }
        .pagination a, .pagination span {
            min-width:24px; text-align:center; padding:6px 7px; border:1px solid #e5e7eb;
            border-radius:8px; text-decoration:none; color:#374151; background:#fff; font-size:9px;
        }
        .pagination .active { background:#03c75a; color:#fff; border-color:#03c75a; }

        .comment-form { margin-top:18px; }
        .comment-form textarea {
            width:100%; box-sizing:border-box; border:1px solid #d1d5db; border-radius:10px;
            padding:12px; min-height:90px; resize:vertical; margin-top:10px; margin-bottom:10px;
        }
        .comment-form .submit-row { display:flex; justify-content:flex-end; }
        .comment-form button { border:none; background:#03c75a; color:#fff; padding:10px 16px; border-radius:8px; cursor:pointer; font-weight:700; }

        .bottom-actions { margin-top: 18px; display: flex; justify-content: center; }
        .list-btn { text-decoration: none; border: 1px solid #e5e7eb; background: #fff; color: #374151; border-radius: 10px; padding: 10px 18px; font-weight: 700; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: topLayout(${isAuthenticated})}"></div>

    <section class="card">
        <h1 class="title" th:text="${qna.title}">질문 제목</h1>
        <div class="meta">
            <span th:text="${#temporals.format(qna.createdAt, 'yyyy.MM.dd HH:mm')}">2026.03.04 10:00</span>
            · <span th:text="'작성자: ' + ${qna.authorUsername}">작성자: user</span>
            · <span th:text="'조회수: ' + ${qna.viewCount}">조회수: 0</span>
        </div>
    </section>

    <section class="card">
        <h2 class="section-title">첨부파일</h2>
        <div class="file-box" th:if="${qna.attachmentOriginalName != null}"><span th:text="${qna.attachmentOriginalName}">파일명</span></div>
        <div class="file-box" th:if="${qna.attachmentOriginalName == null}">첨부파일이 없습니다</div>
    </section>

    <section class="card">
        <h2 class="section-title">내용</h2>
        <div class="content" th:text="${qna.content}">질문 내용</div>
    </section>

    <section class="card">
        <h2 class="section-title">댓글</h2>

        <div class="accepted-box" th:if="${acceptedComment != null}">
            <form th:if="${isAuthor}" th:action="@{/community/qna/{id}/comments/unaccept(id=${qna.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="unaccept-btn" type="submit" onclick="return confirm('채택을 취소하시겠습니까?');">취소</button>
            </form>
            <div>
                <span class="comment-author" th:text="${acceptedComment.authorUsername}">작성자</span>
                <span class="accepted-badge">채택됨</span>
            </div>
            <div class="comment-content" th:text="${acceptedComment.content}">채택 댓글</div>
        </div>

        <div class="comment-item" th:each="comment : ${comments}">
            <div>
                <span class="comment-author" th:text="${comment.authorUsername}">작성자</span>
                <span class="comment-date" th:text="${#temporals.format(comment.createdAt, 'yyyy.MM.dd HH:mm')}">2026.03.04 10:00</span>
                <span class="accepted-badge" th:if="${comment.accepted}">채택됨</span>
            </div>
            <div class="comment-content" th:text="${comment.content}">댓글 내용</div>

            <form th:if="${isAuthor}" th:action="@{/community/qna/{qid}/comments/{cid}/accept(qid=${qna.id}, cid=${comment.id})}" method="post"
                  th:onsubmit="${acceptedComment != null and !comment.accepted} ? 'return confirm(\'채택한 글을 바꾸시겠습니까?\');' : null">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="accept-btn" type="submit">채택하기</button>
            </form>

            <div class="comment-actions" th:if="${canComment and currentUsername != null and currentUsername == comment.authorUsername}">
                <a th:href="@{/community/qna/{qid}/comments/{cid}/edit(qid=${qna.id}, cid=${comment.id})}" onclick="return confirm('정말로 수정 하시겠습니까?');">수정</a>
                <form th:action="@{/community/qna/{qid}/comments/{cid}/delete(qid=${qna.id}, cid=${comment.id})}" method="post" style="margin:0;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" onclick="return confirm('정말로 삭제 하시겠습니까?');">삭제</button>
                </form>
            </div>
        </div>

        <div class="comment-item" th:if="${#lists.isEmpty(comments)}"><div class="comment-content">등록된 댓글이 없습니다.</div></div>

        <div class="pagination">
            <a th:if="${hasPrevCommentGroup}" th:href="@{/community/qna/{id}(id=${qna.id}, page=${prevCommentGroupPage})}">←</a>
            <th:block th:each="p : ${#numbers.sequence(commentStartPage, commentEndPage)}">
                <a th:if="${p != commentPage}" th:href="@{/community/qna/{id}(id=${qna.id}, page=${p})}" th:text="${p}">1</a>
                <span th:if="${p == commentPage}" class="active" th:text="${p}">1</span>
            </th:block>
            <a th:if="${hasNextCommentGroup}" th:href="@{/community/qna/{id}(id=${qna.id}, page=${nextCommentGroupPage})}">→</a>
        </div>

        <form class="comment-form" th:if="${canComment}" th:action="@{/community/qna/{id}/comments(id=${qna.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <textarea name="content" placeholder="댓글(답변)을 입력하세요"></textarea>
            <div class="submit-row"><button type="submit">댓글 등록</button></div>
        </form>
        <p th:if="${!canComment}" style="color:#6b7280; font-size:14px; margin-top:14px;">댓글 작성은 관리자/사업자만 가능합니다.</p>
    </section>

    <div style="display:flex; justify-content:flex-end; gap:8px; margin-bottom:10px;" th:if="${isAuthor}">
        <a class="list-btn" th:href="@{/community/qna/{id}/edit(id=${qna.id})}" style="padding:8px 14px;">수정하기</a>
        <form th:action="@{/community/qna/{id}/delete(id=${qna.id})}" method="post" style="margin:0;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="list-btn" style="padding:8px 14px; cursor:pointer;" onclick="return confirm('정말 삭제하시겠습니까?');">삭제하기</button>
        </form>
    </div>

    <div class="bottom-actions"><a class="list-btn" th:href="@{/community/qna}">목록으로</a></div>
</div>
</body>
</html>
