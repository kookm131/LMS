<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>공지 수정</title>
  <style>
    body { margin:0; font-family:"Noto Sans KR", Arial, sans-serif; background:#f9fafb; }
    .container { max-width:1100px; margin:0 auto; padding:20px; }
    .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .logo { font-size:28px; font-weight:800; color:#03c75a; letter-spacing:-0.5px; text-decoration:none; }
    .user-menu a { text-decoration:none; color:#374151; margin-left:14px; font-size:14px; }
    .main-menu { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
    .main-menu a { text-decoration:none; background:white; border:1px solid #e5e7eb; padding:10px 16px; border-radius:999px; color:#111827; font-weight:600; font-size:14px; }
    .search-area { background:white; border:1px solid #e5e7eb; border-radius:16px; padding:20px; margin-bottom:20px; }
    .search-box { display:flex; border:2px solid #03c75a; border-radius:999px; overflow:hidden; }
    .search-box input { flex:1; border:none; padding:14px 18px; font-size:16px; outline:none; }
    .search-box button { border:none; background:#03c75a; color:white; padding:0 22px; font-weight:700; cursor:pointer; }
    .card { background:#fff; border:1px solid #e5e7eb; border-radius:14px; padding:20px; }
    .row { margin-bottom:14px; }
    label { display:block; margin-bottom:8px; font-weight:700; }
    input, textarea { width:100%; box-sizing:border-box; border:1px solid #d1d5db; border-radius:10px; padding:10px; }
    textarea { min-height:220px; resize:vertical; margin:10px 0; }
    .actions { display:flex; justify-content:space-between; }
    .btn { text-decoration:none; border:1px solid #d1d5db; background:#fff; color:#374151; padding:10px 14px; border-radius:8px; }
    .btn-primary { border-color:#03c75a; background:#03c75a; color:#fff; font-weight:700; }
  </style>
</head>
<body>
<div class="container">
  <div th:replace="~{fragments/layout :: topLayout(${isAuthenticated})}"></div>
  <section class="card">
    <h1>공지사항 수정</h1>
    <form th:action="@{/community/notices/{id}/edit(id=${notice.id})}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="row"><label>제목</label><input name="title" required maxlength="200" th:value="${notice.title}"/></div>
      <div class="row"><label>내용</label><textarea name="content" required th:text="${notice.content}"></textarea></div>
      <div class="actions">
        <a class="btn" th:href="@{/community/notices}">취소</a>
        <button class="btn btn-primary" type="submit">저장</button>
      </div>
    </form>
  </section>
</div>
</body>
</html>
