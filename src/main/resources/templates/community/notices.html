<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>공지사항</title>
    <style>
        body { margin:0; font-family:"Noto Sans KR", Arial, sans-serif; background:#f9fafb; color:#111827; }
        .container { max-width:1100px; margin:0 auto; padding:20px; }

        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .logo { font-size:28px; font-weight:800; color:#03c75a; letter-spacing:-0.5px; text-decoration:none; }
        .user-menu a { text-decoration:none; color:#374151; margin-left:14px; font-size:14px; }
        .main-menu { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
        .main-menu a { text-decoration:none; background:white; border:1px solid #e5e7eb; padding:10px 16px; border-radius:999px; color:#111827; font-weight:600; font-size:14px; }
        .search-area { background:white; border:1px solid #e5e7eb; border-radius:16px; padding:20px; margin-bottom:20px; }
        .search-box { display:flex; border:2px solid #03c75a; border-radius:999px; overflow:hidden; }
        .search-box input { flex:1; border:none; padding:14px 18px; font-size:16px; outline:none; }
        .search-box button { border:none; background:#03c75a; color:white; padding:0 22px; font-weight:700; cursor:pointer; }

        .board { background:#fff; border:1px solid #e5e7eb; border-radius:14px; padding:16px; }
        .board h1 { margin:0 0 14px; font-size:24px; }

        .notice-item { display:flex; justify-content:space-between; gap:12px; padding:12px 10px; border-bottom:1px solid #f1f5f9; }
        .notice-item:last-child { border-bottom:none; }
        .left { display:flex; flex-direction:column; gap:8px; min-width:0; flex:1; }
        .notice-title { margin:0; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .notice-meta { color:#6b7280; font-size:13px; white-space:nowrap; display:flex; align-items:center; gap:8px; }
        .comment-count { color:#811010; font-weight:400; }

        .admin-actions { display:flex; gap:6px; justify-content:flex-end; flex-wrap:wrap; }
        .admin-actions form { margin:0; display:inline-flex; }
        .btn-mini { display:inline-flex; align-items:center; justify-content:center; min-height:30px; border:1px solid #d1d5db; background:#fff; color:#374151; border-radius:7px; padding:0 10px; font-size:12px; line-height:1; cursor:pointer; text-decoration:none; box-sizing:border-box; }
        .btn-danger { border-color:#ef4444; color:#b91c1c; }
        .btn-pin { border-color:#16a34a; color:#166534; }
        .btn-cancel { border-color:#2563eb; }

        .pinned .notice-title { font-weight:700; }

        .pagination { margin-top:14px; display:flex; justify-content:center; gap:6px; flex-wrap:wrap; }
        .pagination a, .pagination span { min-width:24px; text-align:center; padding:6px 7px; border:1px solid #e5e7eb; border-radius:8px; text-decoration:none; color:#374151; background:#fff; font-size:9px; }
        .pagination .active { background:#03c75a; color:#fff; border-color:#03c75a; }

        .write-btn {
            position: fixed; right: 24px; bottom: 24px; z-index: 1000;
            border: none; background:#03c75a; color:#fff; border-radius:999px;
            padding:14px 18px; font-weight:700; text-decoration:none;
            box-shadow:0 8px 20px rgba(3,199,90,.3);
        }
    </style>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: topLayout(${isAuthenticated})}"></div>

    <section class="board">
        <h1>공지사항</h1>

        <div class="notice-item pinned" th:each="notice : ${pinnedNotices}">
            <div class="left">
                <p class="notice-title"><a th:href="@{/community/notices/{id}(id=${notice.id})}" th:text="'[고정] ' + ${notice.title}" style="text-decoration:none;color:inherit;">[고정] 공지</a></p>
                <div class="notice-meta">
                    <span class="comment-count" th:text="${notice.commentCount}">0</span>
                    <span th:text="${#temporals.format(notice.createdAt, 'yyyy.MM.dd')}">2026.03.04</span>
                </div>
            </div>
            <div class="admin-actions" th:if="${isAdmin}">
                <form th:action="@{/community/notices/{id}/unpin(id=${notice.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button class="btn-mini btn-cancel" type="submit">취소</button>
                </form>
                <a class="btn-mini" th:href="@{/community/notices/{id}/edit(id=${notice.id})}">수정</a>
                <form th:action="@{/community/notices/{id}/delete(id=${notice.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button class="btn-mini btn-danger" type="submit" onclick="return confirm('공지를 삭제하시겠습니까?');">삭제</button>
                </form>
            </div>
        </div>

        <div class="notice-item" th:each="notice : ${notices}">
            <div class="left">
                <p class="notice-title"><a th:href="@{/community/notices/{id}(id=${notice.id})}" th:text="${notice.title}" style="text-decoration:none;color:inherit;">공지</a></p>
                <div class="notice-meta">
                    <span class="comment-count" th:text="${notice.commentCount}">0</span>
                    <span th:text="${#temporals.format(notice.createdAt, 'yyyy.MM.dd')}">2026.03.04</span>
                </div>
            </div>
            <div class="admin-actions" th:if="${isAdmin}">
                <form th:action="@{/community/notices/{id}/pin(id=${notice.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button class="btn-mini btn-pin" type="submit">고정</button>
                </form>
                <a class="btn-mini" th:href="@{/community/notices/{id}/edit(id=${notice.id})}">수정</a>
                <form th:action="@{/community/notices/{id}/delete(id=${notice.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button class="btn-mini btn-danger" type="submit" onclick="return confirm('공지를 삭제하시겠습니까?');">삭제</button>
                </form>
            </div>
        </div>

        <div class="pagination">
            <a th:if="${hasPrevGroup}" th:href="@{/community/notices(page=${prevGroupPage})}">←</a>
            <th:block th:each="p : ${#numbers.sequence(startPage, endPage)}">
                <a th:if="${p != currentPage}" th:href="@{/community/notices(page=${p})}" th:text="${p}">1</a>
                <span th:if="${p == currentPage}" class="active" th:text="${p}">1</span>
            </th:block>
            <a th:if="${hasNextGroup}" th:href="@{/community/notices(page=${nextGroupPage})}">→</a>
        </div>
    </section>
</div>

<a class="write-btn" th:if="${isAdmin}" th:href="@{/community/notices/write}">작성하기</a>
</body>
</html>
