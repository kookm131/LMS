<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>QnA 질문하기</title>
    <style>
        body { margin:0; font-family:"Noto Sans KR", Arial, sans-serif; background:#f9fafb; color:#111827; }
        .container { max-width:1100px; margin:0 auto; padding:20px; }

        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .logo { font-size:28px; font-weight:800; color:#03c75a; letter-spacing:-0.5px; text-decoration:none; }
        .user-menu a { text-decoration:none; color:#374151; margin-left:14px; font-size:14px; }
        .main-menu { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
        .main-menu a { text-decoration:none; background:white; border:1px solid #e5e7eb; padding:10px 16px; border-radius:999px; color:#111827; font-weight:600; font-size:14px; }
        .search-area { background:white; border:1px solid #e5e7eb; border-radius:16px; padding:20px; margin-bottom:20px; }
        .search-box { display:flex; border:2px solid #03c75a; border-radius:999px; overflow:hidden; }
        .search-box input { flex:1; border:none; padding:14px 18px; font-size:16px; outline:none; }
        .search-box button { border:none; background:#03c75a; color:white; padding:0 22px; font-weight:700; cursor:pointer; }

        .board { background:#fff; border:1px solid #e5e7eb; border-radius:14px; padding:20px; }
        .board h1 { margin:0 0 16px; font-size:24px; }

        .form-row { margin-bottom:14px; }
        .form-row label { display:block; margin-bottom:8px; font-size:14px; color:#374151; font-weight:700; }
        .form-row input[type="text"],
        .form-row textarea,
        .form-row input[type="file"] {
            width:100%; box-sizing:border-box; border:1px solid #d1d5db; border-radius:10px; padding:10px;
            font-size:14px; background:#fff;
        }
        .form-row textarea { min-height:220px; resize:vertical; }

        .bottom-row {
            margin-top: 18px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .list-wrap { flex:1; display:flex; justify-content:center; }

        .list-btn {
            text-decoration:none;
            border:1px solid #e5e7eb;
            background:#fff;
            color:#374151;
            border-radius:10px;
            padding:10px 18px;
            font-weight:700;
            font-size:14px;
        }

        .submit-wrap { min-width:110px; display:flex; justify-content:flex-end; }

        .submit-btn {
            border:none;
            background:#03c75a;
            color:#fff;
            border-radius:10px;
            padding:10px 18px;
            font-weight:700;
            font-size:14px;
            cursor:pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: topLayout(${isAuthenticated})}"></div>

    <section class="board">
        <h1>질문하기</h1>

        <form th:action="@{/community/qna/write}" method="post" enctype="multipart/form-data">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-row">
                <label for="title">제목</label>
                <input id="title" name="title" type="text" maxlength="200" required/>
            </div>

            <div class="form-row">
                <label for="content">내용</label>
                <textarea id="content" name="content" required></textarea>
            </div>

            <div class="form-row">
                <label for="attachment">첨부파일 (이미지/영상)</label>
                <input id="attachment" name="attachment" type="file" accept="image/*,video/*"/>
            </div>

            <div class="bottom-row">
                <div style="min-width:110px;"></div>
                <div class="list-wrap">
                    <a class="list-btn" th:href="@{/community/qna}">목록으로</a>
                </div>
                <div class="submit-wrap">
                    <button class="submit-btn" type="submit">확인</button>
                </div>
            </div>
        </form>
    </section>
</div>
</body>
</html>
