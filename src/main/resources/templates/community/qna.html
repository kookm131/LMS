<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>QnA</title>
    <style>
        body { margin:0; font-family:"Noto Sans KR", Arial, sans-serif; background:#f9fafb; color:#111827; }
        .container { max-width:1100px; margin:0 auto; padding:20px; }

        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .logo { font-size:28px; font-weight:800; color:#03c75a; letter-spacing:-0.5px; text-decoration:none; }
        .user-menu a { text-decoration:none; color:#374151; margin-left:14px; font-size:14px; }
        .main-menu { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
        .main-menu a { text-decoration:none; background:white; border:1px solid #e5e7eb; padding:10px 16px; border-radius:999px; color:#111827; font-weight:600; font-size:14px; }
        .search-area { background:white; border:1px solid #e5e7eb; border-radius:16px; padding:20px; margin-bottom:20px; }
        .search-box { display:flex; border:2px solid #03c75a; border-radius:999px; overflow:hidden; }
        .search-box input { flex:1; border:none; padding:14px 18px; font-size:16px; outline:none; }
        .search-box button { border:none; background:#03c75a; color:white; padding:0 22px; font-weight:700; cursor:pointer; }

        .board { background:#fff; border:1px solid #e5e7eb; border-radius:14px; padding:16px; margin-bottom:14px; }
        .board h1 { margin:0 0 14px; font-size:24px; }
        .board h2 { margin:0 0 12px; font-size:20px; }

        .notice-item { display:flex; justify-content:space-between; gap:12px; padding:12px 10px; border-bottom:1px solid #f1f5f9; }
        .notice-item:last-child { border-bottom:none; }
        .notice-title { margin:0; font-size:15px; font-weight:300; }
        .notice-title.faq { font-weight:600; font-size:16px; }
        .notice-date { color:#6b7280; font-size:13px; white-space:nowrap; }

        .pagination { margin-top:14px; display:flex; justify-content:center; gap:6px; flex-wrap:wrap; }
        .pagination a, .pagination span {
            min-width:24px; text-align:center; padding:6px 7px; border:1px solid #e5e7eb;
            border-radius:8px; text-decoration:none; color:#374151; background:#fff; font-size:9px;
        }
        .pagination .active { background:#03c75a; color:#fff; border-color:#03c75a; }

        .qna-actions {
            display:flex;
            justify-content:flex-end;
            margin-top:12px;
            margin-bottom:20px;
        }

        .ask-btn {
            border: none;
            background: #03c75a;
            color: #fff;
            border-radius: 999px;
            padding: 12px 18px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(3, 199, 90, 0.25);
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: topLayout(${isAuthenticated})}"></div>

    <section class="board">
        <h1>자주 묻는 질문</h1>

        <div class="notice-item" th:each="q : ${faqItems}">
            <p class="notice-title faq"><a th:href="@{/community/qna/{id}(id=${q.id})}" th:text="'[FAQ] ' + ${q.title}" style="text-decoration:none; color:inherit;">[FAQ] 자주 묻는 질문 제목</a></p>
        </div>

        <div class="notice-item" th:if="${#lists.isEmpty(faqItems)}">
            <p class="notice-title faq">자주 묻는 질문이 없습니다.</p>
        </div>
    </section>

    <section class="board">
        <h1>QnA</h1>

        <div class="notice-item" th:each="q : ${qnaItems}">
            <p class="notice-title"><a th:href="@{/community/qna/{id}(id=${q.id})}" th:text="${q.title}" style="text-decoration:none; color:inherit;">질문 제목</a></p>
            <span class="notice-date" th:text="${#temporals.format(q.createdAt, 'yyyy.MM.dd')}">2026.03.04</span>
        </div>

        <div class="notice-item" th:if="${#lists.isEmpty(qnaItems)}">
            <p class="notice-title">등록된 질문이 없습니다.</p>
        </div>

        <div class="pagination">
            <a th:if="${hasPrevGroup}" th:href="@{/community/qna(page=${prevGroupPage})}">←</a>

            <th:block th:each="p : ${#numbers.sequence(startPage, endPage)}">
                <a th:if="${p != currentPage}" th:href="@{/community/qna(page=${p})}" th:text="${p}">1</a>
                <span th:if="${p == currentPage}" class="active" th:text="${p}">1</span>
            </th:block>

            <a th:if="${hasNextGroup}" th:href="@{/community/qna(page=${nextGroupPage})}">→</a>
        </div>
    </section>

    <div class="qna-actions">
        <a class="ask-btn" th:href="@{/community/qna/write}">질문하기</a>
    </div>
</div>
</body>
</html>
