<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<!--
  공통 상단 레이아웃 조각
  포함 범위: 로고 + 유저 메뉴 + 메인 메뉴 + 검색창
-->
<header class="top-layout" th:fragment="topLayout(isAuthenticated)">
    <div class="top-bar">
        <a class="logo" th:href="@{/}">CodePilot</a>

        <nav class="user-menu">
            <a th:if="${!isAuthenticated}" th:href="@{/signup}">회원가입</a>
            <a th:if="${!isAuthenticated}" th:href="@{/login}">로그인</a>

            <form th:if="${isAuthenticated}" th:action="@{/logout}" method="post" style="display:inline; margin-left:14px;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" style="border:none; background:none; color:#374151; font-size:14px; cursor:pointer; padding:0;">
                    로그아웃
                </button>
            </form>

            <a href="#">설정</a>
        </nav>
    </div>

    <nav class="main-menu">
        <a th:href="@{/enrollments}">수강신청</a>

        <div class="study-menu" th:if="${!isBusinessUser}"
             style="position:relative; display:flex; align-items:center;"
             onmouseenter="this.querySelector('.study-dropdown').style.display='block'"
             onmouseleave="this.querySelector('.study-dropdown').style.display='none'">
            <a href="#">학습하기</a>
            <div class="study-dropdown"
                 style="display:none; position:absolute; top:38px; left:0; background:#fff; border:1px solid #d1d5db; border-radius:14px; min-width:190px; padding:8px; z-index:1000; box-shadow:0 8px 20px rgba(0,0,0,0.08);">
                <a th:href="@{/study/enrollments}" style="display:block; padding:10px 12px; border-radius:10px; border:1px solid #d1d5db; background:#fff; text-decoration:none; color:#111827; font-weight:600; margin-bottom:6px;">수강신청내역</a>
                <a th:href="@{/study/notes}" style="display:block; padding:10px 12px; border-radius:10px; border:1px solid #d1d5db; background:#fff; text-decoration:none; color:#111827; font-weight:600; margin-bottom:6px;">학습 메모</a>
                <a href="#" style="display:block; padding:10px 12px; border-radius:10px; border:1px solid #d1d5db; background:#fff; text-decoration:none; color:#111827; font-weight:600; margin-bottom:6px;">문의 내용</a>
                <a th:href="@{/study/satisfaction}" style="display:block; padding:10px 12px; border-radius:10px; border:1px solid #d1d5db; background:#fff; text-decoration:none; color:#111827; font-weight:600;">만족도 평가</a>
            </div>
        </div>

        <div class="biz-menu" th:if="${isBusinessUser}"
             style="position:relative; display:flex; align-items:center;"
             onmouseenter="this.querySelector('.biz-dropdown').style.display='block'"
             onmouseleave="this.querySelector('.biz-dropdown').style.display='none'">
            <a th:href="@{/business/courses}">강의 관리</a>
            <div class="biz-dropdown"
                 style="display:none; position:absolute; top:38px; left:0; background:#fff; border:1px solid #d1d5db; border-radius:14px; min-width:190px; padding:8px; z-index:1000; box-shadow:0 8px 20px rgba(0,0,0,0.08);">
                <a th:href="@{/business/courses}" style="display:block; padding:10px 12px; border-radius:10px; border:1px solid #d1d5db; background:#fff; text-decoration:none; color:#111827; font-weight:600; margin-bottom:6px;">강의관리</a>
                <a href="#" style="display:block; padding:10px 12px; border-radius:10px; border:1px solid #d1d5db; background:#fff; text-decoration:none; color:#111827; font-weight:600; margin-bottom:6px;">수강생관리</a>
                <a href="#" style="display:block; padding:10px 12px; border-radius:10px; border:1px solid #d1d5db; background:#fff; text-decoration:none; color:#111827; font-weight:600; margin-bottom:6px;">출결관리</a>
                <a th:href="@{/business/exams}" style="display:block; padding:10px 12px; border-radius:10px; border:1px solid #d1d5db; background:#fff; text-decoration:none; color:#111827; font-weight:600; margin-bottom:6px;">시험관리</a>
                <a th:href="@{/business/satisfaction}" style="display:block; padding:10px 12px; border-radius:10px; border:1px solid #d1d5db; background:#fff; text-decoration:none; color:#111827; font-weight:600;">만족도관리</a>
            </div>
        </div>

        <div class="mypage-menu" style="position:relative; display:flex; align-items:center;"
             onmouseenter="this.querySelector('.mypage-dropdown').style.display='block'"
             onmouseleave="this.querySelector('.mypage-dropdown').style.display='none'">
            <a href="#">마이페이지</a>
            <div class="mypage-dropdown"
                 style="display:none; position:absolute; top:38px; left:0; background:#fff; border:1px solid #d1d5db; border-radius:14px; min-width:180px; padding:8px; z-index:1000; box-shadow:0 8px 20px rgba(0,0,0,0.08);">
                <a href="#" style="display:block; padding:10px 12px; border-radius:10px; border:1px solid #d1d5db; background:#fff; text-decoration:none; color:#111827; font-weight:600; margin-bottom:6px;">회원정보</a>
                <a th:if="${isAdmin}" th:href="@{/admin/dashboard}" style="display:block; padding:10px 12px; border-radius:10px; border:1px solid #d1d5db; background:#fff; text-decoration:none; color:#111827; font-weight:600; margin-bottom:6px;">대시보드</a>
                <a th:if="${!isBusinessUser}" th:href="@{/study/schedule}" style="display:block; padding:10px 12px; border-radius:10px; border:1px solid #d1d5db; background:#fff; text-decoration:none; color:#111827; font-weight:600;">수강스케줄</a>
            </div>
        </div>

        <div class="community-menu" style="position:relative; display:flex; align-items:center;"
             onmouseenter="this.querySelector('.community-dropdown').style.display='block'"
             onmouseleave="this.querySelector('.community-dropdown').style.display='none'">
            <a href="#">커뮤니티</a>
            <div class="community-dropdown"
                 style="display:none; position:absolute; top:38px; left:0; background:#fff; border:1px solid #d1d5db; border-radius:14px; min-width:180px; padding:8px; z-index:1000; box-shadow:0 8px 20px rgba(0,0,0,0.08);">
                <a th:href="@{/community/notices}" style="display:block; padding:10px 12px; border-radius:10px; border:1px solid #d1d5db; background:#fff; text-decoration:none; color:#111827; font-weight:600; margin-bottom:6px;">공지사항</a>
                <a th:href="@{/community/qna}" style="display:block; padding:10px 12px; border-radius:10px; border:1px solid #d1d5db; background:#fff; text-decoration:none; color:#111827; font-weight:600;">QnA</a>
            </div>
        </div>
    </nav>

    <section class="search-area">
        <form id="globalSearchForm" th:action="@{/enrollments}" method="get">
            <div class="search-box">
                <input name="keyword" type="text" th:value="${keyword}" placeholder="배우고 싶은 강의를 검색해보세요"/>
                <button type="submit">검색</button>
            </div>
        </form>
    </section>
</header>
</body>
</html>
