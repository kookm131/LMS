<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>출결관리</title>
    <style>
        :root { --main:#03c75a; --line:#e5e7eb; --bg:#f9fafb; }
        * { box-sizing:border-box; }
        body { margin:0; font-family:"Noto Sans KR", Arial, sans-serif; background:var(--bg); color:#111827; }
        .container { max-width:1100px; margin:0 auto; padding:20px; }

        .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; }
        h1 { margin:0 0 14px; font-size:24px; }
        .desc { margin:0 0 18px; color:#6b7280; font-size:14px; }

        .filter-wrap { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
        .select {
            min-width:320px;
            height:42px;
            border:1px solid #d1d5db;
            border-radius:10px;
            padding:0 12px;
            background:#fff;
            font-size:14px;
            color:#111827;
        }
        .hint { margin-top:16px; font-size:13px; color:#6b7280; }
        .empty { padding:14px; border:1px dashed #d1d5db; border-radius:10px; background:#f9fafb; color:#6b7280; font-size:14px; }
    </style>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: topLayout(${isAuthenticated})}"></div>

    <section class="card">
        <h1>출결관리</h1>
        <p class="desc">강의를 선택하면 해당 강의 기준으로 출결관리 화면을 확장할 수 있습니다.</p>

        <div th:if="${#lists.isEmpty(myCourses)}" class="empty">
            등록한 강의가 없습니다.
        </div>

        <form th:if="${!#lists.isEmpty(myCourses)}" method="get" th:action="@{/business/attendance}">
            <div class="filter-wrap">
                <label for="courseId" style="font-weight:700; font-size:14px;">내 강의 선택</label>
                <select id="courseId" name="courseId" class="select" onchange="this.form.submit()">
                    <option value="">강의를 선택하세요</option>
                    <option th:each="c : ${myCourses}"
                            th:value="${c.id}"
                            th:text="${c.title}"
                            th:selected="${selectedCourseId != null and selectedCourseId == c.id}">강의명</option>
                </select>
            </div>
        </form>

        <p class="hint" th:if="${selectedCourseId != null}">
            선택한 강의 ID: <strong th:text="${selectedCourseId}">0</strong>
        </p>
    </section>
</div>
</body>
</html>
