<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>시험 문제 추가/수정</title>
    <style>
        :root { --main:#03c75a; --line:#e5e7eb; --bg:#f9fafb; }
        * { box-sizing:border-box; }
        body { margin:0; font-family:"Noto Sans KR", Arial, sans-serif; background:var(--bg); color:#111827; }
        .container { max-width:1100px; margin:0 auto; padding:20px; }

        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .logo { font-size:28px; font-weight:800; color:var(--main); text-decoration:none; }
        .user-menu a { text-decoration:none; color:#374151; margin-left:14px; font-size:14px; }
        .main-menu { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
        .main-menu a { text-decoration:none; background:white; border:1px solid var(--line); padding:10px 16px; border-radius:999px; color:#111827; font-weight:600; font-size:14px; }
        .search-area { background:white; border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:20px; }
        .search-box { display:flex; border:2px solid var(--main); border-radius:999px; overflow:hidden; }
        .search-box input { flex:1; border:none; padding:14px 18px; font-size:16px; outline:none; }
        .search-box button { border:none; background:var(--main); color:white; padding:0 22px; font-weight:700; cursor:pointer; }

        .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:14px; position:relative; }
        h1 { margin:0 0 10px; font-size:24px; }
        h2 { margin:0 0 10px; font-size:18px; }

        .field { margin-bottom:10px; }
        .label { display:block; font-size:13px; color:#374151; margin-bottom:6px; font-weight:700; }
        input[type="text"], textarea {
            width:100%; border:1px solid #d1d5db; border-radius:8px; padding:10px; font-size:14px;
        }
        textarea { min-height:80px; }
        .options { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .option-row { border:1px solid #e5e7eb; border-radius:8px; padding:10px; }
        .option-row label { font-size:13px; font-weight:700; color:#374151; display:block; margin-bottom:6px; }

        .delete-btn {
            position:absolute; top:14px; right:14px;
            border:1px solid #ef4444; color:#ef4444; background:#fff;
            border-radius:8px; padding:6px 10px; font-size:12px; font-weight:700; cursor:pointer;
        }

        .actions-right { display:flex; justify-content:flex-end; margin-top:14px; }
        .btn { text-decoration:none; border:1px solid #03c75a; background:#03c75a; color:#fff; border-radius:8px; padding:8px 12px; font-size:12px; font-weight:700; cursor:pointer; }
        .btn.sub { border-color:#d1d5db; background:#fff; color:#374151; }

        .bottom-actions { margin-top: 18px; display: flex; justify-content: center; }
    </style>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: topLayout(${isAuthenticated})}"></div>

    <section class="card">
        <h1 th:text="${course.title} + ' - 시험 문제 추가/수정'">시험 문제 추가/수정</h1>
    </section>

    <form id="questionForm" th:action="@{/business/exams/{id}/questions/edit(id=${courseId})}" method="post">
        <p th:if="${param.error != null}" style="color:#dc2626; font-size:13px; margin:0 0 10px;">문제/선택지/정답은 필수입니다.</p>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div id="questionList">
            <th:block th:if="${#lists.isEmpty(questions)}">
                <section class="card question-card">
                    <button type="button" class="delete-btn" onclick="removeQuestion(this)">문제삭제</button>
                    <h2>문제 1</h2>

                    <div class="field">
                        <label class="label">문제</label>
                        <textarea name="questionText" placeholder="문제를 입력하세요" required></textarea>
                    </div>

                    <div class="field">
                        <label class="label">참고자료(이미지 URL)</label>
                        <input type="text" name="referenceImageUrl" placeholder="https://...png"/>
                    </div>

                    <div class="options">
                        <div class="option-row"><label>선택지 1</label><input type="text" name="option1" required/></div>
                        <div class="option-row"><label>선택지 2</label><input type="text" name="option2" required/></div>
                        <div class="option-row"><label>선택지 3</label><input type="text" name="option3" required/></div>
                        <div class="option-row"><label>선택지 4</label><input type="text" name="option4" required/></div>
                    </div>

                    <div class="field" style="margin-top:10px;">
                        <label class="label">정답</label>
                        <label><input type="radio" name="correctOption_0" value="1" checked/> 1번</label>
                        <label><input type="radio" name="correctOption_0" value="2"/> 2번</label>
                        <label><input type="radio" name="correctOption_0" value="3"/> 3번</label>
                        <label><input type="radio" name="correctOption_0" value="4"/> 4번</label>
                        <input type="hidden" name="correctOption" value="1"/>
                    </div>
                </section>
            </th:block>

            <th:block th:each="q, stat : ${questions}">
                <section class="card question-card">
                    <button type="button" class="delete-btn" onclick="removeQuestion(this)">문제삭제</button>
                    <h2 th:text="'문제 ' + ${stat.index + 1}">문제</h2>

                    <div class="field">
                        <label class="label">문제</label>
                        <textarea name="questionText" th:text="${q.questionText}" required></textarea>
                    </div>

                    <div class="field">
                        <label class="label">참고자료(이미지 URL)</label>
                        <input type="text" name="referenceImageUrl" th:value="${q.referenceImageUrl}" placeholder="https://...png"/>
                    </div>

                    <div class="options">
                        <div class="option-row"><label>선택지 1</label><input type="text" name="option1" th:value="${q.option1}" required/></div>
                        <div class="option-row"><label>선택지 2</label><input type="text" name="option2" th:value="${q.option2}" required/></div>
                        <div class="option-row"><label>선택지 3</label><input type="text" name="option3" th:value="${q.option3}" required/></div>
                        <div class="option-row"><label>선택지 4</label><input type="text" name="option4" th:value="${q.option4}" required/></div>
                    </div>

                    <div class="field" style="margin-top:10px;">
                        <label class="label">정답</label>
                        <label><input type="radio" th:name="${'correctOption_' + stat.index}" value="1" th:checked="${q.correctOption == 1}"/> 1번</label>
                        <label><input type="radio" th:name="${'correctOption_' + stat.index}" value="2" th:checked="${q.correctOption == 2}"/> 2번</label>
                        <label><input type="radio" th:name="${'correctOption_' + stat.index}" value="3" th:checked="${q.correctOption == 3}"/> 3번</label>
                        <label><input type="radio" th:name="${'correctOption_' + stat.index}" value="4" th:checked="${q.correctOption == 4}"/> 4번</label>
                        <input type="hidden" name="correctOption" th:value="${q.correctOption}"/>
                    </div>
                </section>
            </th:block>
        </div>

        <div class="actions-right">
            <button type="button" class="btn" onclick="addQuestion()">문제추가하기</button>
        </div>

        <div class="bottom-actions" style="gap:8px; margin-top:12px;">
            <button type="submit" class="btn">저장</button>
            <a class="btn sub" th:href="@{/business/exams/{id}(id=${courseId})}">취소</a>
        </div>
    </form>
</div>

<script>
    function syncCorrectOptions() {
        const cards = document.querySelectorAll('.question-card');
        cards.forEach((card, idx) => {
            const title = card.querySelector('h2');
            if (title) title.textContent = '문제 ' + (idx + 1);

            const radios = card.querySelectorAll('input[type="radio"]');
            radios.forEach(r => {
                r.name = 'correctOption_' + idx;
                r.addEventListener('change', () => {
                    if (r.checked) card.querySelector('input[name="correctOption"]').value = r.value;
                });
            });

            const checked = card.querySelector('input[type="radio"]:checked');
            const hidden = card.querySelector('input[name="correctOption"]');
            hidden.value = checked ? checked.value : '1';
        });
    }

    function removeQuestion(btn) {
        const card = btn.closest('.question-card');
        if (card) card.remove();
        syncCorrectOptions();
    }

    function addQuestion() {
        const list = document.getElementById('questionList');
        const card = document.createElement('section');
        card.className = 'card question-card';
        card.innerHTML = `
            <button type="button" class="delete-btn" onclick="removeQuestion(this)">문제삭제</button>
            <h2>문제</h2>
            <div class="field"><label class="label">문제</label><textarea name="questionText" placeholder="문제를 입력하세요" required></textarea></div>
            <div class="field"><label class="label">참고자료(이미지 URL)</label><input type="text" name="referenceImageUrl" placeholder="https://...png"/></div>
            <div class="options">
                <div class="option-row"><label>선택지 1</label><input type="text" name="option1" required/></div>
                <div class="option-row"><label>선택지 2</label><input type="text" name="option2" required/></div>
                <div class="option-row"><label>선택지 3</label><input type="text" name="option3" required/></div>
                <div class="option-row"><label>선택지 4</label><input type="text" name="option4" required/></div>
            </div>
            <div class="field" style="margin-top:10px;">
                <label class="label">정답</label>
                <label><input type="radio" value="1" checked/> 1번</label>
                <label><input type="radio" value="2"/> 2번</label>
                <label><input type="radio" value="3"/> 3번</label>
                <label><input type="radio" value="4"/> 4번</label>
                <input type="hidden" name="correctOption" value="1"/>
            </div>
        `;
        list.appendChild(card);
        syncCorrectOptions();
    }

    const questionForm = document.getElementById('questionForm');
    questionForm.addEventListener('submit', (e) => {
        syncCorrectOptions();
        const cards = document.querySelectorAll('.question-card');
        if (!cards.length) {
            e.preventDefault();
            alert('최소 1개 문제는 필요합니다.');
            return;
        }
        for (const card of cards) {
            const q = card.querySelector('textarea[name="questionText"]')?.value?.trim() || '';
            const o1 = card.querySelector('input[name="option1"]')?.value?.trim() || '';
            const o2 = card.querySelector('input[name="option2"]')?.value?.trim() || '';
            const o3 = card.querySelector('input[name="option3"]')?.value?.trim() || '';
            const o4 = card.querySelector('input[name="option4"]')?.value?.trim() || '';
            const c = Number(card.querySelector('input[name="correctOption"]')?.value || 0);
            if (!q || !o1 || !o2 || !o3 || !o4 || c < 1 || c > 4) {
                e.preventDefault();
                alert('문제, 선택지(4개), 정답은 필수입니다.');
                return;
            }
        }
    });

    syncCorrectOptions();
</script>
</body>
</html>
