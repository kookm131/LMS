<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>수강신청 - CodePilot</title>
    <style>
        :root { --main:#03c75a; --line:#e5e7eb; --bg:#f9fafb; }
        * { box-sizing: border-box; }
        body { margin:0; font-family:"Noto Sans KR", Arial, sans-serif; background:var(--bg); color:#111827; }
        .container { max-width:1100px; margin:0 auto; padding:20px; }

        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .logo { font-size:28px; font-weight:800; color:var(--main); letter-spacing:-0.5px; text-decoration:none; }
        .user-menu a { text-decoration:none; color:#374151; margin-left:14px; font-size:14px; }
        .main-menu { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
        .main-menu a { text-decoration:none; background:white; border:1px solid var(--line); padding:10px 16px; border-radius:999px; color:#111827; font-weight:600; font-size:14px; }

        .search-area { background:white; border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:20px; }
        .search-box { display:flex; border:2px solid var(--main); border-radius:999px; overflow:hidden; }
        .search-box input { flex:1; border:none; padding:14px 18px; font-size:16px; outline:none; }
        .search-box button { border:none; background:var(--main); color:white; padding:0 22px; font-weight:700; cursor:pointer; }

        .content { display:grid; grid-template-columns: 230px 1fr; gap:16px; }
        .side { background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px; height:fit-content; }
        .side h3 { margin:0 0 10px; font-size:16px; }
        .side a { display:block; padding:8px 10px; border-radius:8px; text-decoration:none; color:#374151; font-size:14px; }
        .side a.active, .side a:hover { background:#ecfdf3; color:#047857; }
        .side-register-btn { margin-top:12px; display:block; width:100%; text-align:center; text-decoration:none; border:1px solid var(--main); background:var(--main); color:#fff; padding:10px 12px; border-radius:10px; font-weight:700; font-size:14px; }

        .list { background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px; }
        .list h2 { margin:0 0 12px; font-size:20px; }
        .course-item { position:relative; border:1px solid #eef2f7; border-radius:12px; padding:12px 12px 46px; margin-bottom:10px; }
        .admin-delete-wrap { position:absolute; left:12px; bottom:10px; }
        .admin-delete-btn { border:1px solid #ef4444; background:#ef4444; color:#fff; border-radius:8px; padding:6px 10px; font-size:12px; font-weight:700; cursor:pointer; }
        .course-item:last-child { margin-bottom:0; }
        .course-top { display:flex; justify-content:space-between; gap:10px; margin-bottom:6px; }
        .course-title { margin:0; font-size:16px; }
        .badge { font-size:12px; color:#047857; background:#ecfdf3; border:1px solid #b9f5d0; border-radius:999px; padding:2px 8px; }
        .desc { margin:0 0 8px; color:#4b5563; font-size:13px; }
        .meta { color:#6b7280; font-size:13px; display:flex; gap:10px; flex-wrap:wrap; }

        .pagination { margin-top:14px; display:flex; justify-content:center; gap:6px; flex-wrap:wrap; }
        .pagination a, .pagination span {
            min-width:34px; text-align:center; padding:8px 10px; border:1px solid var(--line);
            border-radius:8px; text-decoration:none; color:#374151; background:#fff; font-size:13px;
        }
        .pagination .active { background:var(--main); color:#fff; border-color:var(--main); }

        @media (max-width: 900px) { .content { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: topLayout(${isAuthenticated})}"></div>

    <div class="content">
        <aside class="side">
            <h3>강의 종류</h3>
            <a th:href="@{/enrollments(keyword=${keyword})}" th:classappend="${selectedCategory == ''} ? 'active'">전체</a>
            <a th:each="cat : ${categories}"
               th:href="@{/enrollments(category=${cat}, keyword=${keyword})}"
               th:text="${cat}"
               th:classappend="${selectedCategory == cat} ? 'active'">카테고리</a>

            <a th:if="${isBusinessUser}" class="side-register-btn" th:href="@{/courses/register}">수강등록</a>
        </aside>

        <section class="list">
            <h2 th:if="${!hasKeyword}">수강신청</h2>
            <h2 th:if="${hasKeyword and !#lists.isEmpty(courses)}" th:text="|${keyword}에 대한 검색결과입니다|">검색결과</h2>
            <h2 th:if="${hasKeyword and #lists.isEmpty(courses)}" th:text="|${keyword}에 대한 검색결과가 없습니다.|">검색결과 없음</h2>

            <article class="course-item" th:each="course : ${courses}">
                <div class="course-top">
                    <h3 class="course-title"><a th:href="@{/courses/{id}(id=${course.id})}" th:text="${course.title}" style="text-decoration:none; color:inherit;">강의명</a></h3>
                    <span class="badge" th:text="${course.category}">카테고리</span>
                </div>
                <p class="desc" th:text="${course.description}">강의설명</p>
                <div class="meta">
                    <span th:text="'강사: ' + ${course.instructorName}">강사명</span>
                    <span th:text="'평점: ★' + ${course.rating}">평점</span>
                    <span th:text="'수강생: ' + ${course.purchaseCount} + '명'">수강생</span>
                </div>
                <div class="admin-delete-wrap" th:if="${isAdmin}">
                    <form th:action="@{/enrollments/{id}/admin-delete(id=${course.id})}" method="post" style="margin:0;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button class="admin-delete-btn" type="submit" onclick="return confirm('정말로 삭제하시겠습니까?');">삭제</button>
                    </form>
                </div>
            </article>

            <div class="pagination">
                <a th:if="${hasPrevGroup}"
                   th:href="@{/enrollments(page=${prevGroupPage}, category=${selectedCategory}, keyword=${keyword})}">이전</a>

                <th:block th:each="p : ${#numbers.sequence(startPage, endPage)}">
                    <a th:if="${p != currentPage}"
                       th:href="@{/enrollments(page=${p}, category=${selectedCategory}, keyword=${keyword})}"
                       th:text="${p}">1</a>
                    <span th:if="${p == currentPage}" class="active" th:text="${p}">1</span>
                </th:block>

                <a th:if="${hasNextGroup}"
                   th:href="@{/enrollments(page=${nextGroupPage}, category=${selectedCategory}, keyword=${keyword})}">다음</a>
            </div>
        </section>
    </div>
</div>
</body>
</html>
