<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>출결관리 상세</title>
    <style>
        :root { --main:#03c75a; --line:#e5e7eb; --bg:#f9fafb; }
        * { box-sizing:border-box; }
        body { margin:0; font-family:"Noto Sans KR", Arial, sans-serif; background:var(--bg); color:#111827; }
        .container { max-width:1100px; margin:0 auto; padding:20px; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .logo { font-size:28px; font-weight:800; color:var(--main); text-decoration:none; }
        .user-menu a { text-decoration:none; color:#374151; margin-left:14px; font-size:14px; }
        .main-menu { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
        .main-menu a { text-decoration:none; background:white; border:1px solid var(--line); padding:10px 16px; border-radius:999px; color:#111827; font-weight:600; font-size:14px; }
        .search-area { background:white; border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:20px; }
        .search-box { display:flex; border:2px solid var(--main); border-radius:999px; overflow:hidden; }
        .search-box input { flex:1; border:none; padding:14px 18px; font-size:16px; outline:none; }
        .search-box button { border:none; background:var(--main); color:white; padding:0 22px; font-weight:700; cursor:pointer; }

        .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; }
        h1 { margin:0 0 8px; font-size:24px; }
        .sub { margin:0 0 14px; color:#6b7280; font-size:14px; }

        table { width:100%; border-collapse:collapse; }
        thead th {
            text-align:left; font-size:13px; color:#374151;
            background:#f8fafc; border-bottom:1px solid #e5e7eb; padding:10px;
        }
        tbody td { border-bottom:1px solid #f1f5f9; padding:10px; font-size:14px; }
        .status {
            display:inline-block; padding:4px 8px; border-radius:999px;
            font-size:12px; font-weight:700;
        }
        .status.attend { background:#dcfce7; color:#166534; }
        .status.late { background:#fee2e2; color:#991b1b; }

        .empty { padding:14px; border:1px dashed #d1d5db; border-radius:10px; background:#f9fafb; color:#6b7280; font-size:14px; }

        .detail-tools { margin-top:14px; display:flex; justify-content:flex-end; }
        .search-form { display:flex; gap:8px; align-items:center; }
        .search-form select, .search-form input {
            height:38px; border:1px solid #d1d5db; border-radius:10px; padding:0 10px; font-size:13px;
        }
        .search-form input { min-width:220px; }
        .search-btn {
            border:none; background:var(--main); color:#fff; border-radius:10px; height:38px;
            padding:0 14px; font-weight:700; cursor:pointer;
        }

        .pagination { margin-top:14px; display:flex; justify-content:center; gap:6px; flex-wrap:wrap; }
        .pagination a, .pagination span {
            min-width:34px; text-align:center; padding:8px 10px; border:1px solid var(--line);
            border-radius:8px; text-decoration:none; color:#374151; background:#fff; font-size:13px;
        }
        .pagination .active { background:var(--main); color:#fff; border-color:var(--main); }

        .bottom-actions { margin-top:14px; display:flex; justify-content:center; }
        .list-btn {
            text-decoration: none;
            border: 1px solid var(--line);
            background: #fff;
            color: #374151;
            border-radius: 10px;
            padding: 10px 18px;
            font-weight: 700;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: topLayout(${isAuthenticated})}"></div>

    <section class="card">
        <h1>출결관리 상세</h1>
        <p class="sub">
            <strong th:text="${course.title}">강의명</strong>
            · 최신 출결순
        </p>

        <div class="empty" th:if="${#lists.isEmpty(rows)}">출결 데이터가 없습니다.</div>

        <table th:if="${!#lists.isEmpty(rows)}">
            <thead>
            <tr>
                <th>학생명</th>
                <th>아이디</th>
                <th>출결일</th>
                <th>마지막 출결시각</th>
                <th>마지막 회차명</th>
                <th>상태</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${rows}">
                <td th:text="${r.studentName}">홍길동</td>
                <td th:text="${r.studentUsername}">hong</td>
                <td th:text="${#temporals.format(r.attendanceDate, 'yyyy-MM-dd')}">2026-03-12</td>
                <td th:text="${#temporals.format(r.lastCheckedAt, 'yyyy-MM-dd HH:mm')}">2026-03-12 10:00</td>
                <td th:text="${r.lastLectureTitle == null ? '-' : r.lastLectureTitle}">1강</td>
                <td>
                    <span th:if="${r.status == 'ATTEND'}" class="status attend">출석</span>
                    <span th:if="${r.status != 'ATTEND'}" class="status late">지각</span>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="pagination" th:if="${!#lists.isEmpty(rows)}">
            <a th:if="${hasPrevGroup}" th:href="@{/business/attendance/{id}(id=${course.id}, page=${prevGroupPage}, searchType=${searchType}, keyword=${keyword})}">&lt;</a>

            <th:block th:each="p : ${#numbers.sequence(startPage, endPage)}">
                <a th:if="${p != currentPage}" th:href="@{/business/attendance/{id}(id=${course.id}, page=${p}, searchType=${searchType}, keyword=${keyword})}" th:text="${p}">1</a>
                <span th:if="${p == currentPage}" class="active" th:text="${p}">1</span>
            </th:block>

            <a th:if="${hasNextGroup}" th:href="@{/business/attendance/{id}(id=${course.id}, page=${nextGroupPage}, searchType=${searchType}, keyword=${keyword})}">&gt;</a>
        </div>

        <div class="detail-tools">
            <form class="search-form" method="get" th:action="@{/business/attendance/{id}(id=${course.id})}">
                <select name="searchType">
                    <option value="studentId" th:selected="${searchType == 'studentId'}">아이디</option>
                    <option value="studentName" th:selected="${searchType == 'studentName'}">학생명</option>
                </select>
                <input type="text" name="keyword" th:value="${keyword}" placeholder="찾는 값을 입력하세요"/>
                <button class="search-btn" type="submit">검색</button>
            </form>
        </div>
    </section>

    <div class="bottom-actions">
        <a class="list-btn" th:href="@{/business/attendance}">목록으로</a>
    </div>
</div>
</body>
</html>
