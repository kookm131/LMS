<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>수강등록</title>
    <style>
        :root { --main:#03c75a; --line:#e5e7eb; --bg:#f9fafb; }
        * { box-sizing:border-box; }
        body { margin:0; font-family:"Noto Sans KR", Arial, sans-serif; background:var(--bg); color:#111827; }
        .container { max-width:980px; margin:0 auto; padding:20px; }

        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .logo { font-size:28px; font-weight:800; color:var(--main); text-decoration:none; }
        .user-menu a { text-decoration:none; color:#374151; margin-left:14px; font-size:14px; }
        .main-menu { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
        .main-menu a { text-decoration:none; background:white; border:1px solid var(--line); padding:10px 16px; border-radius:999px; color:#111827; font-weight:600; font-size:14px; }
        .search-area { background:white; border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:20px; }
        .search-box { display:flex; border:2px solid var(--main); border-radius:999px; overflow:hidden; }
        .search-box input { flex:1; border:none; padding:14px 18px; font-size:16px; outline:none; }
        .search-box button { border:none; background:var(--main); color:white; padding:0 22px; font-weight:700; cursor:pointer; }

        .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px; }
        h1 { margin:0 0 14px; font-size:24px; }

        .row { margin-bottom:12px; }
        label { display:block; margin-bottom:6px; font-size:13px; font-weight:700; }
        input, textarea, select { width:100%; box-sizing:border-box; border:1px solid #d1d5db; border-radius:10px; padding:10px; font-size:14px; }
        textarea { min-height:90px; resize:vertical; margin:10px 0; }

        .outline-row { display:grid; grid-template-columns: 1fr 140px; gap:8px; margin-bottom:8px; }
        .outline-actions { margin-top:8px; }
        .plus-btn { border:1px dashed #9ca3af; background:#fff; color:#374151; padding:8px 12px; border-radius:8px; cursor:pointer; font-size:13px; }

        .submit-wrap { margin-top:16px; display:flex; justify-content:flex-end; gap:8px; }
        .btn { border:1px solid #d1d5db; background:#fff; color:#374151; border-radius:8px; padding:10px 14px; font-weight:700; text-decoration:none; }
        .btn-primary { border-color:var(--main); background:var(--main); color:#fff; }
    </style>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: topLayout(${isAuthenticated})}"></div>

    <section class="card">
        <h1 th:text="${editMode} ? '수강수정' : '수강등록'">수강등록</h1>

        <form th:action="@{/courses/register}" method="post">
            <input type="hidden" name="courseId" th:if="${editMode}" th:value="${editCourse.id}"/>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="row">
                <label>수강이름</label>
                <input name="title" type="text" required th:value="${editMode ? editCourse.title : ''}">
            </div>

            <div class="row">
                <label>카테고리</label>
                <select name="category">
                    <option value="">선택안함</option>
                    <option th:selected="${editMode and editCourse.category == 'AI/자동화'}">AI/자동화</option>
                    <option th:selected="${editMode and editCourse.category == '데이터'}">데이터</option>
                    <option th:selected="${editMode and editCourse.category == '백엔드'}">백엔드</option>
                    <option th:selected="${editMode and editCourse.category == '인프라'}">인프라</option>
                    <option th:selected="${editMode and editCourse.category == '프론트엔드'}">프론트엔드</option>
                </select>
            </div>

            <div class="row">
                <label>강사이름</label>
                <input name="instructorName" type="text" required th:value="${editMode ? editCourse.instructorName : ''}">
            </div>

            <div class="row">
                <label>설명</label>
                <textarea name="description" placeholder="강의에 대한 간단한 설명을 입력하세요." th:text="${editMode ? editCourse.description : ''}"></textarea>
            </div>

            <div class="row">
                <label>강의 내용</label>
                <textarea name="contentText" placeholder="강의에서 다루는 상세 내용을 입력하세요." th:text="${editMode ? editCourse.contentText : ''}"></textarea>
            </div>

            <div class="row">
                <label>학습목차</label>
                <div id="outlineWrap">
                    <th:block th:if="${!editMode or #lists.isEmpty(outline)}">
                        <div class="outline-row">
                            <input name="outlineTitle" type="text" placeholder="회차 제목 (예: 1강. 오리엔테이션)">
                            <input name="outlineMinutes" type="number" min="1" placeholder="시간(분)">
                        </div>
                    </th:block>
                    <div class="outline-row" th:each="o : ${outline}">
                        <input name="outlineTitle" type="text" placeholder="회차 제목 (예: 1강. 오리엔테이션)" th:value="${o.title}">
                        <input name="outlineMinutes" type="number" min="1" placeholder="시간(분)" th:value="${o.durationMin}">
                    </div>
                </div>
                <div class="outline-actions" style="display:flex; gap:8px;">
                    <button class="plus-btn" type="button" onclick="addOutlineRow()">+ 회차추가하기</button>
                    <button class="plus-btn" type="button" onclick="removeOutlineRow()">- 회차삭제하기</button>
                </div>
            </div>

            <div class="submit-wrap">
                <a class="btn" th:href="@{/enrollments}">취소</a>
                <button class="btn btn-primary" type="submit" th:text="${editMode} ? '수정완료' : '등록'">등록</button>
            </div>
        </form>
    </section>
</div>

<script>
    function addOutlineRow() {
        const wrap = document.getElementById('outlineWrap');
        const row = document.createElement('div');
        row.className = 'outline-row';
        row.innerHTML = `
            <input name="outlineTitle" type="text" placeholder="회차 제목 (예: n강. 주제)">
            <input name="outlineMinutes" type="number" min="1" placeholder="시간(분)">
        `;
        wrap.appendChild(row);
    }

    function removeOutlineRow() {
        const wrap = document.getElementById('outlineWrap');
        if (wrap.children.length <= 1) return;
        wrap.removeChild(wrap.lastElementChild);
    }
</script>
</body>
</html>
