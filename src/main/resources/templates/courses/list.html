<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LMS - 강의 관리</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        h1, h2 { margin-bottom: 0.75rem; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
        .error { color: #d9534f; font-size: 0.9rem; }
        input, textarea { width: 100%; box-sizing:border-box; box-sizing:border-box; padding: 0.5rem; margin: 0.5rem 0 0.75rem; }
        button { padding: 0.5rem 1rem; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; }
        th { background: #f5f5f5; }
    </style>
</head>
<body>

<h1>LMS 강의 관리 (Spring Boot + Thymeleaf + JdbcTemplate)</h1>

<div class="card">
    <h2>강의 등록</h2>

    <form th:action="@{/courses}" th:object="${courseCreateForm}" method="post">
        <label for="title">강의 제목</label>
        <input id="title" type="text" th:field="*{title}" placeholder="예) 스프링부트 입문" />
        <div class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>

        <label for="instructorName">강사명</label>
        <input id="instructorName" type="text" th:field="*{instructorName}" placeholder="예) 홍길동" />
        <div class="error" th:if="${#fields.hasErrors('instructorName')}" th:errors="*{instructorName}"></div>

        <label for="description">설명</label>
        <textarea id="description" th:field="*{description}" rows="4" placeholder="강의 설명을 입력하세요"></textarea>
        <div class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>

        <button type="submit">등록</button>
    </form>
</div>

<div class="card">
    <h2>강의 목록</h2>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>제목</th>
            <th>강사</th>
            <th>설명</th>
            <th>생성일</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(courses)}">
            <td colspan="5">등록된 강의가 없습니다.</td>
        </tr>
        <tr th:each="course : ${courses}">
            <td th:text="${course.id}">1</td>
            <td th:text="${course.title}">제목</td>
            <td th:text="${course.instructorName}">강사</td>
            <td th:text="${course.description}">설명</td>
            <td th:text="${#temporals.format(course.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01 10:00</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
