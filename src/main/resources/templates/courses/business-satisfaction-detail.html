<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>만족도관리 상세</title>
    <style>
        :root { --main:#03c75a; --line:#e5e7eb; --bg:#f9fafb; }
        * { box-sizing:border-box; }
        body { margin:0; font-family:"Noto Sans KR", Arial, sans-serif; background:var(--bg); color:#111827; }
        .container { max-width:1100px; margin:0 auto; padding:20px; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .logo { font-size:28px; font-weight:800; color:var(--main); text-decoration:none; }
        .user-menu a { text-decoration:none; color:#374151; margin-left:14px; font-size:14px; }
        .main-menu { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
        .main-menu a { text-decoration:none; background:white; border:1px solid var(--line); padding:10px 16px; border-radius:999px; color:#111827; font-weight:600; font-size:14px; }
        .search-area { background:white; border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:20px; }
        .search-box { display:flex; border:2px solid var(--main); border-radius:999px; overflow:hidden; }
        .search-box input { flex:1; border:none; padding:14px 18px; font-size:16px; outline:none; }
        .search-box button { border:none; background:var(--main); color:white; padding:0 22px; font-weight:700; cursor:pointer; }
        .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:12px; }
        h1 { margin:0 0 10px; font-size:24px; }
        .meta { color:#4b5563; font-size:14px; }
        .summary-grid { display:grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); gap:12px; }
        .item { border-bottom:1px solid #f1f5f9; padding:12px 0; }
        .item:last-child{border-bottom:none;}
        .rating { color:#f59e0b; font-weight:700; }
        .pagination { margin-top:14px; display:flex; justify-content:center; gap:6px; flex-wrap:wrap; }
        .pagination a, .pagination span { min-width:34px; text-align:center; padding:8px 10px; border:1px solid var(--line); border-radius:8px; text-decoration:none; color:#374151; background:#fff; font-size:13px; }
        .pagination .active { background:var(--main); color:#fff; border-color:var(--main); }
    </style>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: topLayout(${isAuthenticated})}"></div>

    <section class="card">
        <h1>만족도관리</h1>
    </section>

    <section class="card summary-grid">
        <div>
            <h1 th:text="${summary.title}">강의명</h1>
        </div>
        <div style="display:flex; flex-direction:column; justify-content:center; text-align:right; gap:6px;">
            <div class="meta" th:text="'만족도조사 실시한 수 ' + ${summary.surveyCount}">실시한수</div>
            <div class="meta" th:text="'수강생수 ' + ${summary.purchaseCount}">수강생수</div>
            <div class="meta" th:text="'별점 ' + ${#numbers.formatDecimal(summary.avgRating,1,1)}">별점</div>
        </div>
    </section>

    <section class="card">
        <h1 style="font-size:20px;">만족도 내역</h1>
        <a class="item" style="display:block; text-decoration:none; color:inherit;" th:each="s : ${surveys}" th:href="@{/business/satisfaction/{cid}/survey/{sid}(cid=${courseId}, sid=${s.id})}">
            <div class="meta">익명</div>
            <div class="rating" th:text="'★' + ${#numbers.formatDecimal(s.overallRating,1,1)}">★4.5</div>
            <div class="meta" th:text="${s.comment != null and !#strings.isEmpty(s.comment) ? s.comment : '의견 없음'}">코멘트</div>
            <div class="meta" th:text="${#temporals.format(s.createdAt, 'yyyy.MM.dd')}">2026.02.27</div>
        </a>
        <div class="item" th:if="${#lists.isEmpty(surveys)}"><div class="meta">만족도 내역이 없습니다.</div></div>

        <div class="pagination">
            <a th:if="${hasPrevGroup}" th:href="@{/business/satisfaction/{id}(id=${courseId}, page=${prevGroupPage})}">←</a>
            <th:block th:each="p : ${#numbers.sequence(startPage, endPage)}">
                <a th:if="${p != currentPage}" th:href="@{/business/satisfaction/{id}(id=${courseId}, page=${p})}" th:text="${p}">1</a>
                <span th:if="${p == currentPage}" class="active" th:text="${p}">1</span>
            </th:block>
            <a th:if="${hasNextGroup}" th:href="@{/business/satisfaction/{id}(id=${courseId}, page=${nextGroupPage})}">→</a>
        </div>
    </section>

    <div style="display:flex; justify-content:center; margin-top:12px;">
        <a style="text-decoration:none; border:1px solid #d1d5db; border-radius:8px; padding:10px 14px; color:#374151; font-weight:700; background:#fff;" th:href="@{/business/satisfaction}">목록으로</a>
    </div>
</div>
</body>
</html>
