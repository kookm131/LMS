<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>시험관리 상세</title>
    <style>
        :root { --main:#03c75a; --line:#e5e7eb; --bg:#f9fafb; }
        * { box-sizing:border-box; }
        body { margin:0; font-family:"Noto Sans KR", Arial, sans-serif; background:var(--bg); color:#111827; }
        .container { max-width:1100px; margin:0 auto; padding:20px; }

        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .logo { font-size:28px; font-weight:800; color:var(--main); text-decoration:none; }
        .user-menu a { text-decoration:none; color:#374151; margin-left:14px; font-size:14px; }
        .main-menu { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
        .main-menu a { text-decoration:none; background:white; border:1px solid var(--line); padding:10px 16px; border-radius:999px; color:#111827; font-weight:600; font-size:14px; }
        .search-area { background:white; border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:20px; }
        .search-box { display:flex; border:2px solid var(--main); border-radius:999px; overflow:hidden; }
        .search-box input { flex:1; border:none; padding:14px 18px; font-size:16px; outline:none; }
        .search-box button { border:none; background:var(--main); color:white; padding:0 22px; font-weight:700; cursor:pointer; }

        .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:14px; }
        h1 { margin:0 0 8px; font-size:24px; }
        h2 { margin:0 0 10px; font-size:20px; }
        .meta { color:#6b7280; font-size:13px; }

        .row { display:grid; grid-template-columns: 80px 1fr 100px 100px 90px; gap:8px; align-items:center; padding:10px 0; border-bottom:1px solid #f1f5f9; font-size:13px; }
        .row.header { font-weight:700; color:#374151; border-bottom:1px solid #e5e7eb; }
        .row:last-child { border-bottom:none; }

        .exam-footer { margin-top:12px; display:flex; justify-content:flex-end; gap:8px; }
        .btn { text-decoration:none; border:1px solid #03c75a; background:#03c75a; color:#fff; border-radius:8px; padding:8px 12px; font-size:12px; font-weight:700; }
        .btn.sub { border-color:#d1d5db; background:#fff; color:#374151; }

        .bottom-actions { margin-top: 18px; display: flex; justify-content: center; }
        .list-btn { text-decoration: none; border: 1px solid #e5e7eb; background: #fff; color: #374151; border-radius: 10px; padding: 10px 18px; font-weight: 700; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: topLayout(${isAuthenticated})}"></div>

    <section class="card">
        <h1 th:text="${course.title}">강의 제목</h1>
        <div class="meta" th:text="${course.category} + ' · ' + ${course.instructorName} + ' · 수강생 ' + ${course.purchaseCount} + '명'">메타</div>
    </section>

    <section class="card">
        <h2>학습목차</h2>
        <div class="row header">
            <div>순서</div>
            <div>학습목차</div>
            <div>학습시간</div>
            <div>상태</div>
            <div>비고</div>
        </div>

        <div class="row" th:each="o : ${outline}">
            <div th:text="${o.orderNo}">1</div>
            <div th:text="${o.orderNo} + '. ' + ${o.title}">목차</div>
            <div th:text="${o.durationMin} + '분'">20분</div>
            <div>-</div>
            <div>-</div>
        </div>

        <div class="row" th:if="${#lists.isEmpty(outline)}">
            <div>-</div><div>학습목차가 없습니다.</div><div>-</div><div>-</div><div>-</div>
        </div>
    </section>

    <section class="card">
        <h2>시험</h2>
        <div class="meta" th:text="'시험 문제 수: ' + ${questionCount} + '개'">시험 문제 수: 0개</div>
        <div class="meta" style="margin-top:6px;" th:text="'합격 점수: ' + ${passScore} + '점'">합격 점수: 60점</div>

        <div class="exam-footer">
            <form id="passScoreForm" th:action="@{/business/exams/{id}/pass-score(id=${courseId})}" method="post" style="margin:0; display:flex; gap:8px; align-items:center;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <select id="passScoreInput" name="passScore" style="height:34px; border:1px solid #d1d5db; border-radius:8px; padding:0 8px;">
                    <option th:each="s : ${#numbers.sequence(0,100,5)}" th:value="${s}" th:text="${s} + '점'" th:selected="${s == passScore}">60점</option>
                </select>
                <button class="btn" type="submit">합격점수변경</button>
            </form>
            <a class="btn sub" th:href="@{/business/exams/{id}/questions/edit(id=${courseId})}">문제추가/수정</a>
        </div>
    </section>

    <div class="bottom-actions">
        <a class="list-btn" th:href="@{/business/exams}">목록으로</a>
    </div>
</div>
</body>
</html>
