<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${course.title} + ' - 강의상세'">강의상세</title>
    
    <style>
        :root { --main:#03c75a; --line:#e5e7eb; --bg:#f9fafb; }
        * { box-sizing:border-box; }
        body { margin:0; font-family:"Noto Sans KR", Arial, sans-serif; background:var(--bg); color:#111827; }
        .container { max-width:1100px; margin:0 auto; padding:20px; }

        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .logo { font-size:28px; font-weight:800; color:var(--main); text-decoration:none; }
        .user-menu a { text-decoration:none; color:#374151; margin-left:14px; font-size:14px; }
        .main-menu { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
        .main-menu a { text-decoration:none; background:white; border:1px solid var(--line); padding:10px 16px; border-radius:999px; color:#111827; font-weight:600; font-size:14px; }
        .search-area { background:white; border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:20px; }
        .search-box { display:flex; border:2px solid var(--main); border-radius:999px; overflow:hidden; }
        .search-box input { flex:1; border:none; padding:14px 18px; font-size:16px; outline:none; }
        .search-box button { border:none; background:var(--main); color:white; padding:0 22px; font-weight:700; cursor:pointer; }

        .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px; margin-bottom:14px; }
        h1 { margin:0 0 10px; font-size:26px; }
        h2 { margin:0 0 12px; font-size:20px; }

        .meta-row { display:flex; gap:12px; flex-wrap:wrap; color:#4b5563; font-size:14px; }
        .meta-chip { background:#f3f4f6; border-radius:999px; padding:6px 10px; }

        .outline-list, .review-list { list-style:none; margin:0; padding:0; }
        .outline-list li, .review-list li { border-bottom:1px solid #f1f5f9; padding:10px 0; }
        .outline-list li:last-child, .review-list li:last-child { border-bottom:none; }

        .pagination { margin-top:10px; display:flex; justify-content:center; gap:6px; flex-wrap:wrap; }
        .pagination a, .pagination span {
            min-width:34px; text-align:center; padding:8px 10px; border:1px solid var(--line);
            border-radius:8px; text-decoration:none; color:#374151; background:#fff; font-size:13px;
        }
        .pagination .active { background:var(--main); color:#fff; border-color:var(--main); }

        .related-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; }
        .related-item { border:1px solid #eef2f7; border-radius:12px; padding:12px; text-decoration:none; color:inherit; background:#fff; }
        .related-item h3 { margin:0 0 6px; font-size:15px; }
        .small { color:#6b7280; font-size:13px; }

        .floating-register {
            position: fixed;
            right: 24px;
            bottom: 24px;
            z-index: 1000;
            border: none;
            border-radius: 999px;
            background: var(--main);
            color: #fff;
            font-weight: 800;
            font-size: 15px;
            padding: 14px 22px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(3, 199, 90, 0.25);
        }

        .floating-delete {
            background: #dc2626;
            box-shadow: 0 8px 20px rgba(220, 38, 38, 0.25);
        }

        .floating-edit {
            background: #2563eb;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.25);
            text-decoration:none;
            display:inline-flex;
            align-items:center;
            justify-content:center;
        }

        .floating-actions {
            position: fixed;
            right: 24px;
            bottom: 24px;
            z-index: 1000;
            display:flex;
            gap:10px;
        }

        .bottom-actions {
            margin-top: 18px;
            display: flex;
            justify-content: center;
        }

        .business-actions-row { margin-top:14px; display:flex; justify-content:flex-end; gap:8px; }

        .biz-btn { text-decoration:none; border-radius:10px; padding:10px 14px; font-weight:700; font-size:14px; color:#fff; }
        .biz-btn-edit { background:#2563eb; }
        .biz-btn-delete { background:#dc2626; border:none; cursor:pointer; }

        .list-btn {
            text-decoration: none;
            border: 1px solid var(--line);
            background: #fff;
            color: #374151;
            border-radius: 10px;
            padding: 10px 18px;
            font-weight: 700;
            font-size: 14px;
        }

        @media (max-width:900px){
            .related-grid{grid-template-columns:1fr;}
            .floating-register {
                right: 12px;
                left: 12px;
                bottom: 12px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/layout :: topLayout(${isAuthenticated})}"></div>

    <section class="card">
        <h1 th:text="${course.title}">강의명</h1>
        <p th:text="${course.content}">콘텐츠내용</p>
    </section>

    <section class="card">
        <h2>강의 정보</h2>
        <div class="meta-row">
            <span class="meta-chip" th:text="'카테고리: ' + ${course.category}">카테고리</span>
            <span class="meta-chip" th:text="'강사: ' + ${course.instructorName}">강사</span>
            <span class="meta-chip" th:text="'총 수강시간: ' + ${course.totalHours} + '시간'">총 수강시간</span>
            <span class="meta-chip" th:text="'회차당 평균시간: ' + ${course.avgHours} + '분'">회차당 평균시간</span>
            <span class="meta-chip" th:text="'만족도: ★' + ${course.rating}">만족도</span>
        </div>
    </section>

    <section class="card">
        <h2>학습목차</h2>
        <ul class="outline-list">
            <li th:each="o : ${outline}">
                <strong th:text="${o.orderNo} + '. ' + ${o.title}">1. 목차</strong>
                <span class="small" th:text="' (' + ${o.durationMin} + '분)'">(20분)</span>
            </li>
        </ul>
    </section>

    <section class="card">
        <h2 th:text="'수강평 (' + ${reviewCount} + ')'">수강평 (0)</h2>
        <ul class="review-list">
            <li th:each="r : ${reviews}">
                <strong th:text="${r.writerName} + ' · ★' + ${r.rating}">작성자 · 평점</strong>
                <p th:text="${r.content}">리뷰내용</p>
            </li>
        </ul>

        <div class="pagination">
            <a th:if="${reviewHasPrev}" th:href="@{/courses/{id}(id=${course.id}, reviewPage=${reviewPrevPage})}">←</a>
            <th:block th:each="p : ${#numbers.sequence(reviewStartPage, reviewEndPage)}">
                <a th:if="${p != reviewCurrentPage}" th:href="@{/courses/{id}(id=${course.id}, reviewPage=${p})}" th:text="${p}">1</a>
                <span th:if="${p == reviewCurrentPage}" class="active" th:text="${p}">1</span>
            </th:block>
            <a th:if="${reviewHasNext}" th:href="@{/courses/{id}(id=${course.id}, reviewPage=${reviewNextPage})}">→</a>
        </div>
    </section>

    <section class="card">
        <h2>이런 강의는 어떠신가요?</h2>
        <div class="related-grid">
            <a class="related-item" th:each="rc : ${relatedCourses}" th:href="@{/courses/{id}(id=${rc.id})}">
                <h3 th:text="${rc.title}">유사 강의명</h3>
                <p class="small" th:text="${rc.category} + ' · ' + ${rc.instructorName}">카테고리 · 강사</p>
                <p class="small" th:text="'★' + ${rc.rating} + ' · 수강생 ' + ${rc.purchaseCount} + '명'">평점</p>
            </a>
        </div>
    </section>


    <div class="business-actions-row" th:if="${isAuthenticated and isBusinessUser}">
        <a class="biz-btn biz-btn-edit" th:href="@{/courses/register(courseId=${course.id})}">수강수정</a>

        <form th:if="${canDeleteCourse}" th:action="@{/courses/{id}/delete(id=${course.id})}" method="post" style="margin:0;"
              onsubmit="return confirm('정말로 삭제하시겠습니까?');">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="biz-btn biz-btn-delete" type="submit">수강삭제</button>
        </form>

        <button th:if="${!canDeleteCourse}" class="biz-btn biz-btn-delete" type="button"
                onclick="alert('본인이 올린 강의만 삭제하실 수 있습니다.');">수강삭제</button>
    </div>

    <div class="bottom-actions">
        <a class="list-btn" th:href="@{/enrollments}">목록으로</a>
    </div>
</div>

<form th:if="${isAuthenticated and !isBusinessUser}" th:action="@{/enrollments/{id}/apply(id=${course.id})}" method="post"
      onsubmit="return confirm('이 강의를 수강하시겠습니까?');" style="margin:0;">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button class="floating-register" type="submit">수강신청</button>
</form>

<button th:if="${!isAuthenticated}" class="floating-register" type="button"
        onclick="if(confirm('이 강의를 수강하시겠습니까?')) location.href='/login';">수강신청</button>


  




  <section id="lmsChatWidget" style="position:fixed;right:24px;bottom:24px;z-index:1200;width:360px;max-width:calc(100vw - 24px);background:#fff;border:1px solid #e5e7eb;border-radius:14px;box-shadow:0 10px 28px rgba(15,23,42,.18);overflow:hidden;">
    <div id="lmsChatHeader" style="padding:10px 12px;background:#03c75a;color:#fff;font-weight:700;display:flex;align-items:center;justify-content:space-between;cursor:move;user-select:none;">
      <span>LMS 챗봇</span>
      <div style="display:flex;gap:6px;">
        <button id="lmsChatMin" type="button" style="border:none;background:rgba(255,255,255,.2);color:#fff;border-radius:6px;padding:4px 8px;cursor:pointer;">최소화</button>
      </div>
    </div>
    <div id="lmsChatBody">
      <div id="lmsChatMsgs" style="height:280px;overflow:auto;padding:10px;background:#f8fafc;display:flex;flex-direction:column;gap:8px;"></div>
      <div style="display:flex;gap:8px;padding:10px;border-top:1px solid #e5e7eb;">
        <input id="lmsChatInput" type="text" placeholder="강의 관련 질문을 입력하세요" style="flex:1;border:1px solid #d1d5db;border-radius:8px;padding:8px 10px;outline:none;" />
        <button id="lmsChatSend" type="button" style="border:none;background:#03c75a;color:#fff;border-radius:8px;padding:8px 12px;font-weight:700;cursor:pointer;">전송</button>
      </div>
    </div>
  </section>

  <script th:inline="javascript">
    const userName = /*[[${chatUserName}]]*/ `학습자`;
    const ragText = /*[[${course.content}]]*/ `강의내용`;
    let sessionTicket = '';
    const widget = document.getElementById('lmsChatWidget');
    const header = document.getElementById('lmsChatHeader');
    const body = document.getElementById('lmsChatBody');
    const minBtn = document.getElementById('lmsChatMin');
    const msgBox = document.getElementById('lmsChatMsgs');
    const input = document.getElementById('lmsChatInput');
    const sendBtn = document.getElementById('lmsChatSend');

    let minimized = false;
    let dragging = false;
    let startX = 0, startY = 0, baseLeft = 0, baseTop = 0;

    function setMinimized(next) {
      minimized = !!next;
      body.style.display = minimized ? 'none' : 'block';
      minBtn.textContent = minimized ? '복원' : '최소화';
    }

    minBtn.addEventListener('click', () => setMinimized(!minimized));

    header.addEventListener('mousedown', (e) => {
      if (e.target && e.target.tagName === 'BUTTON') return;
      dragging = true;
      startX = e.clientX;
      startY = e.clientY;
      baseLeft = widget.offsetLeft;
      baseTop = widget.offsetTop;
      document.body.style.userSelect = 'none';
    });

    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const nextLeft = Math.max(0, baseLeft + (e.clientX - startX));
      const nextTop = Math.max(0, baseTop + (e.clientY - startY));
      widget.style.left = nextLeft + 'px';
      widget.style.top = nextTop + 'px';
      widget.style.right = 'auto';
      widget.style.bottom = 'auto';
    });

    window.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      document.body.style.userSelect = '';
    });

    function addBubble(text, mine, id) {
      const d = document.createElement('div');
      if (id) d.id = id;
      d.textContent = text;
      d.style.maxWidth = '85%';
      d.style.padding = '8px 10px';
      d.style.borderRadius = '10px';
      d.style.fontSize = '13px';
      d.style.lineHeight = '1.4';
      d.style.alignSelf = mine ? 'flex-end' : 'flex-start';
      d.style.background = mine ? '#dcfce7' : '#ffffff';
      d.style.border = '1px solid #e5e7eb';
      msgBox.appendChild(d);
      msgBox.scrollTop = msgBox.scrollHeight;
      return d;
    }

    async function ensureSessionTicket() {
      if (sessionTicket) return sessionTicket;

      const raw = (userName || '').toLowerCase();
      let sid = raw.replace(/[^a-z0-9-]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
      if (!sid || sid.length < 3) {
        sid = 'guest-' + Math.random().toString(36).slice(2, 10);
      } else {
        sid = 'user-' + sid.slice(0, 40);
      }

      const res = await fetch('/session-ticket/issue', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId: sid })
      });
      const bodyRes = await res.json();
      if (!res.ok || !bodyRes?.sessionTicket) throw new Error(bodyRes?.message || bodyRes?.error || '세션 발급 실패');
      sessionTicket = bodyRes.sessionTicket;
      return sessionTicket;
    }

    async function sendChat() {
      const q = (input.value || '').trim();
      if (!q) return;
      input.value = '';
      addBubble(q, true);
      sendBtn.disabled = true;
      const loading = addBubble('답변 작성중', false, 'lmsChatLoading');
      let dotCount = 0;
      const loadingTimer = setInterval(() => {
        dotCount = (dotCount + 1) % 4;
        loading.textContent = '답변 작성중' + '.'.repeat(dotCount);
      }, 350);

      try {
        const ticket = await ensureSessionTicket();
        const res = await fetch('/chat/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: q, userName: userName || '학습자', ragContext: ragText || '강의내용', sessionTicket: ticket })
        });
        const bodyRes = await res.json();
        if (!res.ok) throw new Error(bodyRes?.message || bodyRes?.error || '요청 실패');
        clearInterval(loadingTimer);
        loading.remove();
        addBubble(bodyRes.answer || '응답이 없습니다.', false);
      } catch (e) {
        clearInterval(loadingTimer);
        loading.remove();
        addBubble('오류: ' + (e.message || '요청 실패'), false);
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', sendChat);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendChat(); });
    addBubble('안녕하세요! 이 페이지 강의 내용 기준으로 도와드릴게요.', false);
  </script>

</body>

</html>
